                        const blockH = blockLines * lineHeight;
                        let lineY = midY - blockH / 2 + lineHeight * 0.78;

                        svg += `<g class="sk-label" data-name="${escapeAttr(n.name)}">`;
                        svg += `<line x1="${edgeX}" y1="${midY}" x2="${leaderEndX}" y2="${midY}" class="sk-leader"/>`;
                        lines.forEach(line => {
                            svg += `<text x="${textX}" y="${lineY.toFixed(1)}" text-anchor="${anchor}" class="sk-label-name" font-size="${labelFontSize.toFixed(1)}">${escapeHtml(line)}</text>`;
                            lineY += lineHeight;
                        });
                        svg += `<text x="${textX}" y="${lineY.toFixed(1)}" text-anchor="${anchor}" class="sk-label-value" font-size="${valueFontSize.toFixed(1)}">${formatFlowValue(n.value)}</text>`;
                        svg += `</g>`;
                    });
                } else {
                    // Middle column: no floating text label (no safe space for one between
                    // adjacent flow columns). The node itself remains hoverable/clickable
                    // with its full name + value in the native tooltip already set on the
                    // <rect> above; here we add only a tiny value chip if the node is tall
                    // enough to hold one without crowding its neighbors. Uses a small white
                    // pill background with dark ink text (matching --sk-ink) rather than
                    // white text with a stroke halo directly on the node color — the halo
                    // approach was confirmed hard to read (the stroke fights the fill text at
                    // small sizes) and the pill stays legible on every node color, including
                    // the saturated profit/cost accents.
                    let lastChipMidY = -Infinity;
                    col.forEach(n => {
                        const midY = (n.y0 + n.y1) / 2;
                        const nodeHeight = n.y1 - n.y0;
                        const tallEnough = nodeHeight >= 16;
                        const wouldCollide = midY - lastChipMidY < MIN_LABEL_GAP;
                        if (!tallEnough || wouldCollide) return;
                        lastChipMidY = midY;

                        const x = colX[c];
                        const chipText = formatFlowValue(n.value);
                        const chipTextW = measureTextWidth(chipText, '600 9.5px Inter, system-ui, sans-serif');
                        const chipW = Math.ceil(chipTextW + 14);
                        const chipH = 15;
                        svg += `<g class="sk-label" data-name="${escapeAttr(n.name)}">`;
                        svg += `<rect x="${x - chipW / 2}" y="${midY - chipH / 2}" width="${chipW}" height="${chipH}" rx="3.5" fill="#ffffff" stroke="#e2dfd5" stroke-width="1"/>`;
                        svg += `<text x="${x}" y="${midY + 3.3}" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="9.5" fill="var(--sk-ink)">${chipText}</text>`;
                        svg += `</g>`;
                    });
                }
            });

            container.innerHTML = `<svg id="sankey-svg" viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sankey-a11y-summary">${svg}</svg>`;
            chartDiv = container.querySelector('#sankey-svg');

            attachLinkHighlighting();
            renderAccessibleSummary(validLinks);
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function escapeAttr(s) {
            return escapeHtml(s).replace(/"/g, '&quot;');
        }

        // Hovering a node, label, or ribbon highlights only what's connected to it.
        function attachLinkHighlighting() {
            const svgEl = chartDiv;
            if (!svgEl) return;
            const ribbonEls = svgEl.querySelectorAll('.sk-ribbon');
            const nodeEls = svgEl.querySelectorAll('.sk-node');
            const labelEls = svgEl.querySelectorAll('.sk-label');

            function setHighlight(name) {
                if (name === null) {
                    ribbonEls.forEach(r => r.classList.remove('is-dimmed'));
                    nodeEls.forEach(n => n.classList.remove('is-dimmed'));
                    labelEls.forEach(l => l.classList.remove('is-dimmed'));
                    return;
                }
                const connected = new Set([name]);
                activeGradientsCache.forEach(r => {
                    if (r.source === name) connected.add(r.target);
                    if (r.target === name) connected.add(r.source);
                });
                ribbonEls.forEach(r => {
                    const isConnected = r.dataset.source === name || r.dataset.target === name;
                    r.classList.toggle('is-dimmed', !isConnected);
                });
                nodeEls.forEach(n => n.classList.toggle('is-dimmed', !connected.has(n.dataset.name)));
                labelEls.forEach(l => l.classList.toggle('is-dimmed', !connected.has(l.dataset.name)));
            }

            nodeEls.forEach(n => {
                n.addEventListener('mouseenter', () => setHighlight(n.dataset.name));
                n.addEventListener('mouseleave', () => setHighlight(null));
            });
            labelEls.forEach(l => {
                l.addEventListener('mouseenter', () => setHighlight(l.dataset.name));
                l.addEventListener('mouseleave', () => setHighlight(null));
            });
            ribbonEls.forEach(r => {
                r.addEventListener('mouseenter', () => {
                    const isSameFlow = (other) => other.dataset.source === r.dataset.source && other.dataset.target === r.dataset.target;
                    ribbonEls.forEach(other => other.classList.toggle('is-dimmed', !isSameFlow(other)));
                    nodeEls.forEach(n => n.classList.toggle('is-dimmed', n.dataset.name !== r.dataset.source && n.dataset.name !== r.dataset.target));
                    labelEls.forEach(l => l.classList.toggle('is-dimmed', l.dataset.name !== r.dataset.source && l.dataset.name !== r.dataset.target));
                });
                r.addEventListener('mouseleave', () => setHighlight(null));
            });
        }

        function renderAccessibleSummary(validLinks) {
            const svgEl = chartDiv;
            if (!svgEl) return;
            const existing = svgEl.querySelector('#sankey-a11y-summary');
            if (existing) existing.remove();
            const desc = document.createElementNS('http://www.w3.org/2000/svg', 'desc');
            desc.id = 'sankey-a11y-summary';
            const lines = validLinks.map(l => `${l.source} to ${l.target}: ${formatFlowValue(l.value)}`);
            desc.textContent = `Sankey diagram flows. ${lines.join('. ')}.`;
            svgEl.insertBefore(desc, svgEl.firstChild);
        }

        function exportJSON() {
            const data = { version: 2, nodes, links };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importJSON() { document.getElementById('json-file-input').click(); }

        // version 2 is a deliberate breaking change from version 1: node.color used to be a
        // literal hex string, and is now a {themeIndex, variant} reference into themePalette
        // (so editing a theme color flows through to every node that uses it — see the
        // Theme palette section above). A version-1 file's color values would silently
        // misinterpret as malformed reference objects if loaded as-is, so this is rejected
        // outright with a specific, actionable error rather than guessed at or
        // auto-migrated. Per explicit decision: old data files are simply incompatible: the
        // person re-exports from the old version's "Export data" (still on hex strings)
        // and rebuilds the file, or starts fresh.
        document.getElementById('json-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.nodes || !data.links) throw new Error("Missing structural arrays");
                    if (data.version !== 2) {
                        throw new Error("This data file is from an older, incompatible version of the app (node colors used to be plain hex codes; they're now theme palette references). Please re-create or re-export this file in the current version.");
                    }
                    const colorRefShapeOk = data.nodes.every(n => !n.color || (typeof n.color === 'object' && typeof n.color.themeIndex === 'number'));
                    if (!colorRefShapeOk) {
                        throw new Error("This data file's node colors aren't in the expected theme-reference format. Please re-create or re-export this file in the current version.");
                    }
                    nodes = data.nodes; links = data.links;
                    renderNodes(); renderFlowsTable(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Couldn't load this file: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        // "Theme" file: just the 8 base palette colors (system default, or whatever the
        // person has customized via the gradient/RGB editor), independent of any node data.
        // This is what flows through to every node's color automatically when loaded —
        // node data files reference theme slots by index, not by literal color, so loading
        // a new theme re-colors the whole diagram without touching node/flow data at all.
        function exportTheme() {
            const blob = new Blob([JSON.stringify({ themeVersion: 1, themePalette }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_theme.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importTheme() { document.getElementById('branding-file-input').click(); }

        document.getElementById('branding-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data.themePalette) || data.themePalette.length !== 8) {
                        throw new Error("Expected a theme file with 8 palette colors.");
                    }
                    const allValidHex = data.themePalette.every(c => /^#[0-9a-fA-F]{6}$/.test(c));
                    if (!allValidHex) throw new Error("Theme file contains an invalid color value.");
                    themePalette = data.themePalette;
                    saveToLocalStorage(); renderNodes(); generateDiagram(); syncSystemThemeSelect();
                } catch (err) { alert("Couldn't load this theme: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        // Exports the live, fully-styled SVG exactly as rendered, with no background
        // fill — the diagram is transparent by default since we never paint one,
        // which keeps the file usable directly in decks, docs, or other designs.
        // Resolves the var(--sk-*) custom properties used on-screen into concrete values,
        // since a standalone SVG file opened outside this page has no access to the page's
        // :root declarations — without this, every accent/neutral color would render as
        // black (the SVG fallback for an unresolved var()).
        const SK_TOKEN_VALUES = {
            '--sk-canvas': '#f7f5f1',
            '--sk-neutral-ribbon': '#aab1bd',
            '--sk-neutral-node': '#7c8694',
            '--sk-accent-profit': '#1f8a5f',
            '--sk-accent-cost': '#c0533e',
            '--sk-ink': '#1c2127',
            '--sk-ink-muted': '#767f8c'
        };
        function resolveTokens(str) {
            return str.replace(/var\((--[a-z-]+)\)/g, (m, token) => SK_TOKEN_VALUES[token] || m);
        }

        function getStyledSvgString() {
            const svgEl = chartDiv;
            if (!svgEl) return null;

            const clone = svgEl.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Export is transparent-background by design (per requirement): the on-screen
            // warm canvas tone is a preview affordance, not part of the exported asset, so
            // the SVG drops cleanly onto decks, docs, or any other background downstream.
            const bgRect = clone.querySelector('rect.sk-canvas-bg');
            if (bgRect) bgRect.remove();

            // Resolve every var(--sk-*) reference left in fill/stroke attributes to its
            // concrete hex value (covers node/ribbon fills, which are set as element
            // attributes rather than through the stylesheet below).
            clone.querySelectorAll('[fill], [stroke]').forEach(el => {
                const fill = el.getAttribute('fill');
                const stroke = el.getAttribute('stroke');
                if (fill && fill.includes('var(')) el.setAttribute('fill', resolveTokens(fill));
                if (stroke && stroke.includes('var(')) el.setAttribute('stroke', resolveTokens(stroke));
            });

            // Inline the stylesheet rules our classes depend on, since a standalone SVG
            // file opened outside this page has no access to its <style> block.
            const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleEl.textContent = `
                .sk-leader { stroke: #c7c2b8; stroke-width: 1px; }
                .sk-label-name { font-family: Inter, system-ui, sans-serif; font-weight: 600; fill: #1c2127; letter-spacing: -0.006em; }
                .sk-label-value { font-family: Inter, system-ui, sans-serif; font-variant-numeric: tabular-nums lining-nums; font-weight: 700; fill: #1c2127; }
            `;
            clone.insertBefore(styleEl, clone.firstChild);

            // Strip transient hover/interaction state — exports should always reflect
            // the diagram's resting state, not whatever was hovered at export time.
            clone.querySelectorAll('.is-dimmed').forEach(el => el.classList.remove('is-dimmed'));

            return new XMLSerializer().serializeToString(clone);
        }

        function exportSVG() {
            if (!chartDiv) return alert("Render diagram first.");
            const svgString = getStyledSvgString();
            if (!svgString) return alert("Could not read chart SVG.");
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sankey_diagram.svg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetAll() {
            if (!confirm("Reset chart workspace entirely?")) return;
            nodes = []; links = []; 
            localStorage.removeItem('sankeyWorkspaceData_v15');
            renderNodes(); renderFlowsTable();
            document.getElementById('sankey-chart').innerHTML = '';
        }

        function loadDefaultExample() {
            nodes = [
                { name: "iPhone", color: { themeIndex: 0, variant: 'base' } },
                { name: "Mac", color: { themeIndex: 1, variant: 'base' } },
                { name: "iPad", color: { themeIndex: 4, variant: 'base' } },
                { name: "Wearables & Home", color: { themeIndex: 6, variant: 'base' } },
                { name: "Services", color: { themeIndex: 5, variant: 'base' } },
                { name: "Direct Channel (Retail/Web)", color: { themeIndex: 4, variant: 'shade0' } },
                { name: "Indirect Channel (Carriers)", color: { themeIndex: 1, variant: 'shade0' } },
                { name: "Gross Margin (Profit)", color: { themeIndex: 3, variant: 'base' } },
                { name: "Cost of Sales", color: { themeIndex: 2, variant: 'base' } }
            ];

            links = [
                { source: "iPhone", target: "Direct Channel (Retail/Web)", value: 35.45 },
                { source: "iPhone", target: "Indirect Channel (Carriers)", value: 165.13 },
                { source: "Mac", target: "Direct Channel (Retail/Web)", value: 10.00 },
                { source: "Mac", target: "Indirect Channel (Carriers)", value: 19.36 },
                { source: "iPad", target: "Direct Channel (Retail/Web)", value: 7.00 },
                { source: "iPad", target: "Indirect Channel (Carriers)", value: 21.30 },
                { source: "Wearables & Home", target: "Direct Channel (Retail/Web)", value: 8.00 },
                { source: "Wearables & Home", target: "Indirect Channel (Carriers)", value: 31.85 },
                { source: "Services", target: "Direct Channel (Retail/Web)", value: 85.20 },
                { source: "Direct Channel (Retail/Web)", target: "Gross Margin (Profit)", value: 80.00 },
                { source: "Direct Channel (Retail/Web)", target: "Cost of Sales", value: 65.65 },
                { source: "Indirect Channel (Carriers)", target: "Gross Margin (Profit)", value: 89.15 },
                { source: "Indirect Channel (Carriers)", target: "Cost of Sales", value: 148.49 }
            ];

            renderNodes();
            renderFlowsTable();
            generateDiagram();
        }

        // Re-render on real size changes (orientation rotation, window resize, browser
        // chrome show/hide) rather than only on the next data edit. Without this, the
        // layout-tier CSS change above would only "work" the next time someone happened to
        // add or edit something — rotating the device wouldn't visibly do anything until
        // then, which defeats the purpose.
        //
        // This uses THREE overlapping signals rather than relying on any single one:
        // window 'resize', 'orientationchange', and ResizeObserver on the canvas shell.
        // This redundancy is deliberate, not accidental belt-and-suspenders: an earlier
        // version used ResizeObserver alone, verified working in desktop-Chromium viewport
        // resize tests, but confirmed NOT working on a real phone (diagram stayed exactly
        // the same width after a real rotation, even though the surrounding CSS grid did
        // correctly switch to its two-column layout). The grid reflowing but the SVG not
        // redrawing points at the resize signal itself failing to fire or firing with a
        // stale width on at least one real mobile browser engine — desktop-emulated
        // viewport resize in a testing tool is not proof a real device's rotation event
        // sequence behaves the same way. 'orientationchange' and 'resize' are the two most
        // universally-supported cross-browser signals for this and don't depend on
        // ResizeObserver semantics at all, so they're included even though ResizeObserver
        // alone "should" cover the same cases in theory.
        //
        // Debounce is longer (250ms, was 120ms) because real mobile browsers can report an
        // intermediate/incorrect viewport size for a brief moment immediately after
        // rotation, before settling on the final post-rotation layout — redrawing too early
        // risks measuring that transient incorrect width. The redraw also re-reads the
        // container's width fresh at fire time (inside generateDiagram() itself), not from
        // any cached value captured when the resize started.
        let resizeRedrawTimer = null;
        function scheduleResizeRedraw() {
            if (resizeRedrawTimer) clearTimeout(resizeRedrawTimer);
            resizeRedrawTimer = setTimeout(() => {
                resizeRedrawTimer = null;
                if (nodes.length && links.length) generateDiagram();
            }, 250);
        }

        function initResizeHandling() {
            window.addEventListener('resize', scheduleResizeRedraw);
            window.addEventListener('orientationchange', scheduleResizeRedraw);

            const shell = document.getElementById('sankey-canvas-shell');
            if (shell && typeof ResizeObserver !== 'undefined') {
                let lastWidth = shell.getBoundingClientRect().width;
                const observer = new ResizeObserver(entries => {
                    const newWidth = entries[0].contentRect.width;
                    // Only schedule on an actual width change, not every observer callback —
                    // generateDiagram() itself replaces the shell's children, which can fire
                    // a spurious observation; comparing widths avoids a feedback loop.
                    if (Math.abs(newWidth - lastWidth) > 1) {
                        lastWidth = newWidth;
                        scheduleResizeRedraw();
                    }
                });
                observer.observe(shell);
            }
        }

        window.onload = function() {
            loadFromLocalStorage();
            
            const slider = document.getElementById('global-opacity-slider');
            slider.value = Math.round(globalOpacityValue * 100);
            document.getElementById('opacity-slider-readout').innerText = slider.value + '%';
            document.getElementById('palette-restrained-btn').classList.toggle('is-active', paletteMode === 'restrained');
            document.getElementById('palette-branded-btn').classList.toggle('is-active', paletteMode === 'branded');
            document.getElementById('style-standard-btn').classList.toggle('is-active', ribbonStyle === 'standard');
            document.getElementById('style-classic-btn').classList.toggle('is-active', ribbonStyle === 'classic');
            document.getElementById('style-modern-btn').classList.toggle('is-active', ribbonStyle === 'modern');
            syncSystemThemeSelect();
            
            if (nodes.length === 0) {
                loadDefaultExample();
            } else {
                renderNodes();
                renderFlowsTable();
                generateDiagram();
            }

            initResizeHandling();
        };
    </script>
</body>
