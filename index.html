<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Me Sankey!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background: #f4f2ed; color: #1c2127; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .mono-num { font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d8d4c9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c7c2b3; }

        /* ---- Unified app chrome ----
           Everything outside the diagram itself (panels, toolbar, inputs) shares the
           diagram's own ink/canvas palette so the whole page reads as one designed
           object, not a generic dashboard wrapped around a nice chart. One card style,
           one button style, one input style, one pill-toggle style — used everywhere. */
        .panel {
            background: #ffffff;
            border: 1px solid #e7e3d8;
            border-radius: 16px;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; border-bottom: 1px solid #f0eee6;
        }
        .panel-title { font-weight: 600; font-size: 13.5px; color: #1c2127; letter-spacing: -0.005em; }
        .panel-subtitle { font-size: 11px; color: #9a9484; margin-top: 1px; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12.5px; font-weight: 500; border-radius: 9px;
            padding: 7px 12px; transition: background-color 0.12s ease, color 0.12s ease;
            cursor: pointer; border: 1px solid transparent; white-space: nowrap;
        }
        .btn-ghost { color: #5b5648; }
        .btn-ghost:hover { background: #f4f2ed; }
        .btn-primary { background: #1c2127; color: #fff; font-weight: 600; }
        .btn-primary:hover { background: #353c45; }
        .btn-danger-ghost { color: #b3503d; }
        .btn-danger-ghost:hover { background: #fbeeec; }
        .btn-icon {
            width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px; color: #9a9484; cursor: pointer; transition: all 0.12s ease;
            border: 1px solid transparent;
        }
        .btn-icon:hover { background: #f4f2ed; color: #1c2127; }

        .field-input {
            width: 100%; background: transparent; border: 1px solid transparent;
            border-radius: 7px; padding: 5px 7px; font-size: 12.5px; color: #1c2127; font-weight: 500;
            transition: border-color 0.12s ease, background-color 0.12s ease;
        }
        .field-input:hover { background: #f8f7f2; }
        .field-input:focus { outline: none; border-color: #c7c2b3; background: #fff; }

        .field-select {
            width: 100%; min-width: 0; border: 1px solid #e7e3d8; border-radius: 8px;
            padding: 6px 8px; font-size: 12px; font-weight: 500; color: #1c2127; background: #fff;
            box-sizing: border-box;
        }
        .field-select:focus { outline: none; border-color: #9a9484; }

        .pill-toggle-group {
            display: inline-flex; align-items: center; background: #f4f2ed;
            border: 1px solid #e7e3d8; border-radius: 10px; padding: 2px; gap: 1px;
        }
        .pill-toggle-btn {
            padding: 6px 11px; font-size: 11.5px; font-weight: 600; border-radius: 8px;
            color: #7c7766; transition: all 0.12s ease; cursor: pointer;
        }
        .pill-toggle-btn:hover { color: #1c2127; }
        .pill-toggle-btn.is-active { background: #1c2127; color: #fff; }

        .editor-row {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 8px; border-radius: 10px; transition: background-color 0.12s ease;
        }
        .editor-row:hover { background: #f8f7f2; }
        .editor-row:hover .row-delete { opacity: 1; }
        .row-delete { opacity: 0; transition: opacity 0.12s ease; }
        /* expand button is always visible so users can discover the feature;
           it shows a filled indicator dot when overrides are active */
        .row-expand { color: #d8d4c9; }
        .row-expand:hover { background: #f4f2ed; color: #1c2127; }
        .row-expand.has-overrides { color: #2563eb; }

        .node-editor-block { border-radius: 10px; overflow: hidden; }
        .node-editor-block .editor-row { border-radius: 0; }

        .node-overrides {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 6px 8px 8px; background: #f8f7f2;
            border-top: 1px solid #f0eee6;
        }
        .override-field { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .override-label {
            font-size: 9.5px; font-weight: 700; color: #9a9484; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .override-hint { font-weight: 500; text-transform: none; letter-spacing: 0; }
        .override-input { width: 80px; font-size: 11px; padding: 4px 6px; }

        .empty-state {
            text-align: center; padding: 36px 16px; color: #b3ad9c;
            border: 1.5px dashed #e7e3d8; border-radius: 12px; background: #fafaf6;
        }

        /* ---- Color swatch trigger + Office-style picker popover ---- */
        .swatch-trigger {
            width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0; cursor: pointer;
            border: 1px solid rgba(28,33,39,0.12); transition: transform 0.12s ease;
        }
        .swatch-trigger:hover { transform: scale(1.08); }

        .color-popover {
            position: absolute; z-index: 50; background: #fff; border-radius: 12px;
            border: 1px solid #e7e3d8; box-shadow: 0 12px 32px rgba(28,33,39,0.16);
            padding: 10px; width: 220px;
        }
        .color-popover-label {
            font-size: 9px; font-weight: 700; color: #b3ad9c; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 6px; padding: 0 2px;
        }
        .color-popover-row { display: flex; gap: 3px; margin-bottom: 3px; }
        .color-popover-row.is-base-row { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #f0eee6; }
        .color-swatch-cell {
            width: 20px; height: 20px; border-radius: 5px; cursor: pointer;
            border: 1px solid rgba(28,33,39,0.06); position: relative; flex-shrink: 0;
            transition: transform 0.1s ease;
        }
        .color-swatch-cell:hover { transform: scale(1.15); z-index: 1; }
        .color-swatch-cell.is-selected::after {
            content: ''; position: absolute; inset: 0; border-radius: 5px;
            box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px #1c2127;
        }
        .color-popover-hint {
            font-size: 9.5px; color: #b3ad9c; text-align: center; margin-top: 8px;
            padding-top: 7px; border-top: 1px solid #f0eee6;
        }
        .color-popover-hint i { font-size: 8.5px; margin-right: 2px; }

        /* Small pencil affordance shown on each base-row (theme) swatch, opening the
           gradient/RGB editor for that theme slot. Hidden until hover so the base row
           doesn't look cluttered at rest. */
        .color-swatch-edit-affordance {
            position: absolute; bottom: -3px; right: -3px; width: 13px; height: 13px;
            background: #1c2127; color: #fff; border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-size: 7px;
            box-shadow: 0 0 0 1.5px #fff;
        }
        .color-swatch-cell:hover .color-swatch-edit-affordance { display: flex; }

        /* Gradient/RGB theme color editor (replaces the grid view when editing a slot) */
        .theme-editor-header {
            display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
            font-size: 11px; font-weight: 600; color: #1c2127;
        }
        .theme-editor-back {
            width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
            border-radius: 5px; color: #7c7766; cursor: pointer; font-size: 9px; flex-shrink: 0;
        }
        .theme-editor-back:hover { background: #f4f2ed; color: #1c2127; }
        .sv-square {
            position: relative; width: 100%; height: 110px; border-radius: 8px;
            cursor: crosshair; overflow: hidden;
        }
        .sv-white-layer { position: absolute; inset: 0; background: linear-gradient(to right, #fff, rgba(255,255,255,0)); }
        .sv-black-layer { position: absolute; inset: 0; background: linear-gradient(to top, #000, rgba(0,0,0,0)); }
        .sv-cursor {
            position: absolute; width: 11px; height: 11px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%); pointer-events: none;
        }
        .hue-strip {
            position: relative; width: 100%; height: 12px; border-radius: 6px; margin-top: 8px; cursor: pointer;
            background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
        }
        .hue-cursor {
            position: absolute; top: -2px; width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
            transform: translateX(-50%); pointer-events: none;
        }
        .rgb-row { display: flex; gap: 5px; margin-top: 8px; }
        .rgb-field { flex: 1; min-width: 0; }
        .rgb-field label { font-size: 8.5px; color: #b3ad9c; font-weight: 700; text-transform: uppercase; }
        .rgb-field input {
            width: 100%; box-sizing: border-box; border: 1px solid #e7e3d8; border-radius: 6px;
            padding: 4px 5px; font-size: 10.5px; font-family: 'IBM Plex Mono', monospace; margin-top: 2px;
        }
        .rgb-field input:focus { outline: none; border-color: #9a9484; }
        .hex-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
        .hex-preview { width: 24px; height: 24px; border-radius: 6px; border: 1px solid #e7e3d8; flex-shrink: 0; }
        .hex-field {
            flex: 1; min-width: 0; border: 1px solid #e7e3d8; border-radius: 6px;
            padding: 5px 7px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #1c2127;
        }
        .hex-field:focus { outline: none; border-color: #9a9484; }

        .interactive-row { transition: all 0.15s ease; }
        .interactive-row:hover { background-color: #f8f7f2; }

        /* ---- Hand-authored Sankey SVG: presentation layer ---- */
        /* Design tokens derived from research on Bloomberg / McKinsey / FT / Economist
           and finance-Sankey exemplars (SankeyArt, SankeyMATIC, USAFacts): a neutral
           base carries most flows, one or two saturated accents carry meaning, ribbons
           are flat (no gradients), and numerals are tabular so values align in columns. */
        :root {
            --sk-canvas: #f7f5f1;          /* warm off-white ground, not stark white */
            --sk-neutral-ribbon: #aab1bd;  /* restrained-mode flow color */
            --sk-neutral-node: #7c8694;    /* restrained-mode node color */
            --sk-accent-profit: #1f8a5f;   /* gross margin / profit */
            --sk-accent-cost: #c0533e;     /* cost / expense */
            --sk-ink: #1c2127;
            --sk-ink-muted: #767f8c;
        }

        #sankey-canvas-shell { background: var(--sk-canvas); border-radius: 16px; }
        #sankey-svg { width: 100%; height: auto; display: block; }

        .sk-ribbon {
            transition: opacity 0.16s ease, filter 0.16s ease;
            cursor: pointer;
        }
        .sk-ribbon.is-highlighted {
            fill-opacity: 1 !important;
            filter: brightness(1.08);
        }
            filter: brightness(0.94);
        }
        .sk-ribbon.is-dimmed {
            opacity: 0.10 !important;
        }

        .sk-node {
            cursor: pointer;
            transition: filter 0.16s ease, opacity 0.16s ease;
        }
        .sk-node:hover {
            filter: brightness(1.08);
        }
        .sk-node.is-dimmed {
            opacity: 0.32;
        }

        .sk-leader {
            stroke: #c7c2b8;
            stroke-width: 1px;
        }

        .sk-col-label {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            fill: var(--sk-ink-muted);
        }

        /* Column labels editor row — shown below the controls strip, one input per column */
        .col-labels-row {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
            padding: 6px 0 2px; border-top: 1px solid #f0eee6;
        }
        .col-labels-row-title {
            font-size: 10px; font-weight: 700; color: #b3ad9c;
            text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
        }
        .col-label-input {
            border: 1px solid #e7e3d8; border-radius: 7px; padding: 4px 8px;
            font-size: 11px; font-weight: 600; color: #1c2127; background: #fff;
            min-width: 0; width: 80px; text-align: center;
        }
        .col-label-input:focus { outline: none; border-color: #9a9484; }
        .col-label-input::placeholder { color: #d8d4c9; font-weight: 400; }

        .sk-label-name {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 600;
            fill: var(--sk-ink);
            letter-spacing: -0.006em;
            cursor: pointer;
            transition: opacity 0.16s ease;
        }
        .sk-label-value {
            font-family: 'Inter', system-ui, sans-serif;
            font-variant-numeric: tabular-nums lining-nums;
            font-weight: 700;
            fill: var(--sk-ink);
        }
        .sk-label.is-dimmed .sk-label-name { opacity: 0.32; }
        .sk-label.is-dimmed .sk-label-value { opacity: 0.32; }

        /* ---- Responsive editor layout ----
           Three tiers, deliberately NOT keyed to Tailwind's lg: (1024px) breakpoint for
           the second tier, because that breakpoint never activates on a phone screen even
           in landscape (typical landscape phone width is ~650-950px). Without a tier in
           between, rotating a phone to landscape just produced a taller scroll of the same
           narrow single-column stack — confirmed by rendering at 844x390 and seeing zero
           layout change versus portrait. Tiers:
             - Default (narrow/portrait): everything stacked, full width, one column.
             - 'landscape' tier (700px+): Nodes top-left, Flows top-right (each getting a
               real half-width column since the row only splits two ways), Diagram spans
               the FULL width underneath, across both columns. This replaced an earlier
               version of this tier that gave Diagram a tall right-hand column sharing
               width with a narrow Nodes+Flows left column — that version technically gave
               Diagram more room than portrait, but nowhere near full width, and was
               reported as not feeling like it widened at all on a real device. Diagram
               spanning the full row width is what actually makes rotating to landscape
               worth it: it can claim the entire available width, not a fraction of it
               shared with another column.
             - 'desktop' tier (1024px+): the original three-way split, Nodes / Flows /
               Diagram each their own column, side by side.
           generateDiagram() re-measures its container and redraws on every call, so
           letting the Diagram area's actual width change at each tier is what makes the
           SVG itself widen — combined with the resize/orientation handling below (which
           calls generateDiagram() again after a debounced resize/orientation event),
           rotating the device becomes a real way to get a wider diagram, not just a wider
           empty card around the same-sized SVG. */
        .sankey-layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-areas: "data" "diagram";
        }
        .sankey-col-data    { grid-area: data; }
        .sankey-col-diagram { grid-area: diagram; }

        @media (min-width: 700px) {
            .sankey-layout-grid {
                grid-template-columns: 1fr 1fr;
                grid-template-areas: "data diagram";
                align-items: start;
            }
        }
        @media (min-width: 1024px) {
            .sankey-layout-grid {
                grid-template-columns: 5fr 6fr;
                grid-template-areas: "data diagram";
            }
        }
        /* Landscape aspect ratios: diagram breaks out of the grid and spans full page width.
           The data panel sits above it, full width. This gives the diagram every available
           pixel of horizontal space regardless of how much data is in the left panel. */
        .sankey-layout-grid.diagram-landscape {
            grid-template-columns: 1fr;
            grid-template-areas: "data" "diagram";
        }

        /* Spreadsheet grid */
        #grid-table th, #grid-table td { border-bottom: 1px solid #f0eee6; padding: 0; }
        #grid-table thead th {
            background: #fafaf6; padding: 7px 10px; font-size: 10px; font-weight: 700;
            color: #9a9484; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
        }
        .grid-series-cell { display: flex; align-items: center; gap: 8px; padding: 5px 8px; min-width: 140px; }
        .grid-series-name {
            flex: 1; min-width: 0; border: 1px solid transparent; border-radius: 6px;
            padding: 3px 5px; font-size: 12px; font-weight: 600; color: #1c2127; background: transparent;
        }
        .grid-series-name:hover { background: #f8f7f2; }
        .grid-series-name:focus { outline: none; border-color: #c7c2b3; background: #fff; }
        .grid-value-cell { padding: 4px 6px; min-width: 68px; }
        .grid-value-input {
            width: 100%; border: 1px solid transparent; border-radius: 6px;
            padding: 4px 6px; font-size: 12px; font-weight: 500; color: #1c2127;
            background: transparent; text-align: right; font-family: 'IBM Plex Mono', monospace;
        }
        .grid-value-input:hover { background: #f8f7f2; }
        .grid-value-input:focus { outline: none; border-color: #c7c2b3; background: #fff; }
        .grid-value-input::placeholder { color: #d8d4c9; }
        .grid-col-label-input {
            border: 1px solid transparent; border-radius: 6px; padding: 3px 6px;
            font-size: 11px; font-weight: 700; color: #1c2127; background: transparent;
            text-align: center; width: 68px;
        }
        .grid-col-label-input:hover { background: #f8f7f2; }
        .grid-col-label-input:focus { outline: none; border-color: #c7c2b3; background: #fff; }
        .grid-delete-btn {
            opacity: 0; width: 20px; height: 20px; border-radius: 5px; color: #c7c2b3;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px;
        }
        #grid-table tr:hover .grid-delete-btn { opacity: 1; }
        .grid-delete-btn:hover { color: #b3503d; background: #fbeeec; }
        .transfer-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 3px 2px; border-radius: 7px; }
        .transfer-row:hover { background: #f8f7f2; }
        .transfer-select {
            border: 1px solid #e7e3d8; border-radius: 7px; padding: 4px 6px;
            font-size: 11.5px; font-weight: 500; color: #1c2127; background: #fff; max-width: 110px;
        }
        .transfer-col-select {
            border: 1px solid #e7e3d8; border-radius: 7px; padding: 4px 5px;
            font-size: 11px; color: #5b5648; background: #f4f2ed; width: 56px;
        }
        .transfer-value-input {
            border: 1px solid #e7e3d8; border-radius: 7px; padding: 4px 6px;
            font-size: 11.5px; font-weight: 600; color: #1c2127; background: #fff;
            width: 58px; text-align: right; font-family: 'IBM Plex Mono', monospace;
        }
        .transfer-arrow { color: #b3ad9c; font-size: 11px; padding: 0 1px; }

        /* ---- Smart Table ---- */
        .smart-table-wrap {
            overflow-x: auto; flex: 1;
        }
        .smart-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .smart-table thead th {
            padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700;
            color: #9a9484; text-transform: uppercase; letter-spacing: 0.05em;
            background: #fafaf6; border-bottom: 1px solid #ede9e0; white-space: nowrap;
        }
        .smart-table tbody tr {
            border-bottom: 1px solid #f4f2ed; transition: background 0.1s;
        }
        .smart-table tbody tr:hover { background: #f8f7f3; }
        .smart-table tbody tr.row-highlighted { background: #eef4fd; }
        .smart-table td { padding: 3px 4px; vertical-align: middle; }
        .smart-table td.td-arrow {
            width: 20px; text-align: center; color: #c7c2b3; font-size: 11px; padding: 0;
        }
        .smart-table td.td-value { width: 76px; }
        .smart-table td.td-del { width: 28px; text-align: center; }

        /* Node cell: color dot + text input side by side */
        .node-cell {
            display: flex; align-items: center; gap: 6px;
        }
        .node-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
            cursor: pointer; border: 1.5px solid rgba(0,0,0,0.12);
            transition: transform 0.1s; position: relative;
        }
        .node-dot:hover { transform: scale(1.25); }
        .node-dot.unset { background: #e7e3d8; border-style: dashed; }

        .node-input {
            flex: 1; min-width: 0; border: none; outline: none; background: transparent;
            font-size: 12.5px; font-weight: 500; color: #1c2127; padding: 6px 4px;
            font-family: inherit;
        }
        .node-input::placeholder { color: #c7c2b3; font-weight: 400; }

        .value-input {
            width: 100%; border: none; outline: none; background: transparent;
            font-size: 12.5px; font-weight: 600; color: #1c2127; padding: 6px 8px;
            text-align: right; font-family: 'IBM Plex Mono', monospace;
        }
        .value-input::placeholder { color: #c7c2b3; font-weight: 400; }

        .row-del-btn {
            opacity: 0; width: 22px; height: 22px; border-radius: 5px;
            color: #c7c2b3; font-size: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: opacity 0.1s, background 0.1s, color 0.1s;
        }
        .smart-table tbody tr:hover .row-del-btn { opacity: 1; }
        .row-del-btn:hover { color: #b3503d; background: #fbeeec; }

        /* Autocomplete dropdown */
        .node-autocomplete {
            position: fixed; z-index: 1000;
            background: #fff; border: 1px solid #e0dbd0; border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden; min-width: 160px;
        }
        .autocomplete-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; font-size: 12.5px; font-weight: 500; color: #1c2127;
            cursor: pointer; transition: background 0.08s;
        }
        .autocomplete-item:hover, .autocomplete-item.is-active { background: #f4f2ed; }
        .autocomplete-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .sk-ribbon, .sk-node, .sk-label-name { transition: none !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-[1600px] mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-7 pb-5 border-b border-[#e7e3d8]">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-[#1c2127] rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-diagram-project text-sm"></i>
                </div>
                <h1 class="text-xl font-bold title-font tracking-tight">Make Me Sankey</h1>
            </div>

            <div class="flex flex-wrap items-center gap-1">
                <button onclick="importJSON()" class="btn btn-ghost" title="Import data (.json)">
                    <i class="fa-solid fa-file-import text-[11px]"></i><span>Import</span>
                </button>
                <button onclick="exportJSON()" class="btn btn-ghost" title="Export data (.json)">
                    <i class="fa-solid fa-file-export text-[11px]"></i><span>Export data</span>
                </button>

                <div class="w-px h-5 bg-[#e7e3d8] mx-1.5"></div>

                <button onclick="importTheme()" class="btn btn-ghost" title="Load a theme palette (8 colors)">
                    <i class="fa-solid fa-palette text-[11px]"></i><span>Load theme</span>
                </button>
                <button onclick="exportTheme()" class="btn btn-ghost" title="Save the current theme palette">
                    <i class="fa-solid fa-floppy-disk text-[11px]"></i><span>Save theme</span>
                </button>

                <div class="w-px h-5 bg-[#e7e3d8] mx-1.5"></div>

                <button onclick="resetAll()" class="btn btn-danger-ghost" title="Clear all data">
                    <i class="fa-solid fa-trash-can text-[11px]"></i><span>Clear</span>
                </button>
                <button onclick="exportSVG()" class="btn btn-primary ml-1" title="Download as SVG (transparent background)">
                    <i class="fa-solid fa-vector-square text-[11px]"></i><span>Export SVG</span>
                </button>
            </div>
        </div>

        <div class="sankey-layout-grid gap-6 items-start">
            
            <div class="sankey-col-data panel p-0 flex flex-col">

                <!-- Smart table header -->
                <div class="panel-header">
                    <div>
                        <span class="panel-title">Flows</span>
                        <p class="panel-subtitle">Each row is a connection. Click any node name to set its color.</p>
                    </div>
                </div>

                <!-- The smart table -->
                <div class="smart-table-wrap">
                    <table class="smart-table" id="smart-table">
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th></th>
                                <th>Target</th>
                                <th>Value</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="smart-table-body"></tbody>
                    </table>
                </div>

                <!-- Autocomplete dropdown (shared, repositioned by JS) -->
                <div id="node-autocomplete" class="node-autocomplete" style="display:none;"></div>

            </div>

            <div class="sankey-col-diagram panel p-0 flex flex-col min-h-[540px]">
                <div class="panel-header flex-col !items-stretch gap-3">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="panel-title">Diagram</span>
                            <p class="panel-subtitle">Updates automatically as you edit</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <div class="pill-toggle-group">
                            <button id="palette-restrained-btn" onclick="setPaletteMode('restrained')" class="pill-toggle-btn">Restrained</button>
                            <button id="palette-branded-btn" onclick="setPaletteMode('branded')" class="pill-toggle-btn">Branded</button>
                        </div>
                        <select id="system-theme-select" class="field-select" style="width:auto; padding-right:24px;"
                                onchange="applySystemTheme(this.value)" title="Preset color theme for node/ribbon colors">
                            <option value="Default">Theme: Default</option>
                            <option value="Neon">Theme: Neon</option>
                            <option value="Natural">Theme: Natural</option>
                            <option value="Spring">Theme: Spring</option>
                            <option value="Summer">Theme: Summer</option>
                            <option value="Autumn">Theme: Autumn</option>
                            <option value="Winter">Theme: Winter</option>
                            <option value="Industrial">Theme: Industrial</option>
                            <option value="__custom__" disabled>Theme: Custom</option>
                        </select>
                        <div class="pill-toggle-group">
                            <button id="style-standard-btn" onclick="setRibbonStyle('standard')" class="pill-toggle-btn">Standard</button>
                            <button id="style-classic-btn" onclick="setRibbonStyle('classic')" class="pill-toggle-btn">Classic</button>
                            <button id="style-modern-btn" onclick="setRibbonStyle('modern')" class="pill-toggle-btn">Modern</button>
                        </div>
                        <div class="flex items-center gap-2.5 pl-1">
                            <span class="text-[11px] font-medium text-[#9a9484]">Fade</span>
                            <input type="range" id="global-opacity-slider" min="0" max="100" value="45"
                                   class="w-20 h-1 bg-[#e7e3d8] rounded-full appearance-none cursor-pointer accent-[#1c2127]"
                                   oninput="updateCanvasOpacity(this.value)">
                            <span id="opacity-slider-readout" class="text-[11px] font-semibold text-[#5b5648] min-w-[28px] tabular-nums">45%</span>
                        </div>
                        <div class="pill-toggle-group">
                            <button id="show-values-btn" onclick="toggleShowValues()" class="pill-toggle-btn is-active" title="Show or hide numeric values on nodes">Values</button>
                            <button id="pass-through-btn" onclick="togglePassThrough()" class="pill-toggle-btn" title="Expand to show intermediate pass-through nodes">Expand</button>
                        </div>
                        <div class="pill-toggle-group">
                            <button class="aspect-btn pill-toggle-btn" data-aspect="16:9" onclick="setDiagramAspect('16:9')" title="Widescreen landscape">16:9</button>
                            <button class="aspect-btn pill-toggle-btn" data-aspect="4:3" onclick="setDiagramAspect('4:3')" title="Standard landscape">4:3</button>
                            <button class="aspect-btn pill-toggle-btn" data-aspect="portrait" onclick="setDiagramAspect('portrait')" title="Portrait">Portrait</button>
                        </div>
                    </div>
                    <div id="col-labels-row" style="display:none;" class="col-labels-row"></div>
                </div>

                <div id="sankey-canvas-shell" class="p-3 relative">
                    <div id="sankey-chart" class="w-full"></div>
                </div>
            </div>
            
        </div>
    </div>

    <input type="file" id="json-file-input" accept=".json" class="hidden">
    <input type="file" id="branding-file-input" accept=".json" class="hidden">

    <script>
        let nodes = [];
        let links = [];
        let columnLabels = []; // optional display labels per column index, e.g. ["2015","2019","2024"]
        let chartDiv = null;
        let globalOpacityValue = 0.45; 
        let paletteMode = 'restrained'; // 'restrained' (research-backed default) | 'branded' (per-node hue)
        let ribbonStyle = 'standard'; // 'standard' (flat) | 'classic' (subtle brush texture) | 'modern' (subtle glass highlight)
        let diagramAspect = '16:9'; // '16:9' | '4:3' | 'portrait'
        let showValues = true;      // when false, value chips/labels are hidden and only node names show
        let showPassThrough = false;  // false = collapsed (simpler view); true = show all intermediate nodes
        let activeGradientsCache = [];

        // ---- V3 series model ----
        // The v3 data model separates identity (a named series like "Aviva") from instances
        // (Aviva at 2015, Aviva at 2019, Aviva at 2024). This allows a node to carry a single
        // name, color, and definition while appearing at multiple columns with different values,
        // rather than requiring "Aviva (2015)" / "Aviva (2019)" as separate identities that
        // happen to share a display name. When seriesModel is non-null, the app operates in
        // v3 mode; compileSeriesModel() expands it into the existing nodes/links/columnLabels
        // arrays that the rendering engine uses, then generateDiagram() runs unchanged.
        let seriesColumns = null; // [{id: 0, label: "2015"}, ...]
        let seriesModel   = null; // [{name, color, values: {"0": 50, "1": 70}}, ...]
        let seriesFlows   = null; // [{from, fromCol, to, toCol, value}, ...]

        function isV3Mode() { return seriesModel !== null; }

        function compileSeriesModel() {
            if (!seriesModel) return;
            nodes = [];
            const nodeKey = {};
            seriesModel.forEach(s => {
                Object.entries(s.values || {}).forEach(([colIdStr, val]) => {
                    const colId = parseInt(colIdStr, 10);
                    const internal = `${s.name}@${colId}`;
                    nodeKey[`${s.name}:${colId}`] = internal;
                    nodes.push({ name: internal, displayName: s.name, color: s.color, value: val, column: colId });
                });
            });

            // Explicit transfers declared by the user
            const explicitLinks = (seriesFlows || []).map(f => ({
                source: nodeKey[`${f.from}:${f.fromCol}`],
                target: nodeKey[`${f.to}:${f.toCol}`],
                value: f.value
            })).filter(l => l.source && l.target);

            // Auto carry-forwards: for each series, for each adjacent column pair where
            // the series exists in both, generate a carry-forward link. Carry-forward
            // value = series value at fromCol minus sum of any explicit outgoing transfers
            // from this series at fromCol. If the remainder ≤ 0 the carry-forward is
            // omitted (series effectively exits, e.g. Zurich transferring all 12 to Aviva).
            const autoLinks = [];
            const sortedColIds = (seriesColumns || []).map(c => c.id).sort((a, b) => a - b);
            seriesModel.forEach(s => {
                for (let i = 0; i < sortedColIds.length - 1; i++) {
                    const fromColId = sortedColIds[i];
                    const toColId   = sortedColIds[i + 1];
                    const srcKey = `${s.name}:${fromColId}`;
                    const tgtKey = `${s.name}:${toColId}`;
                    if (!nodeKey[srcKey] || !nodeKey[tgtKey]) continue; // series absent at one end
                    const fromValue = s.values[fromColId] || 0;
                    const outgoingTransfers = (seriesFlows || [])
                        .filter(f => f.from === s.name && f.fromCol === fromColId)
                        .reduce((sum, f) => sum + (f.value || 0), 0);
                    const carryForward = fromValue - outgoingTransfers;
                    if (carryForward > 0) {
                        autoLinks.push({ source: nodeKey[srcKey], target: nodeKey[tgtKey], value: carryForward });
                    }
                }
            });

            links = [...autoLinks, ...explicitLinks];

            // Sync column display labels
            columnLabels = [];
            if (seriesColumns) {
                seriesColumns.forEach(c => { columnLabels[c.id] = c.label || ''; });
            }
        }

        // ---- Theme palette ----
        // The single source of truth for "Branded" mode colors. Nodes don't store a literal
        // hex value — they store a REFERENCE into this palette ({themeIndex, variant}), and
        // the actual color is derived live by resolveThemeColor() every time it's needed.
        // This means changing a theme color (e.g. making theme slot 3 a different blue)
        // automatically updates every node that references it, at whatever tint/shade
        // variant each node had chosen — exactly like Word/Excel's "Theme Colors": the
        // document doesn't remember "blue", it remembers "Accent 3, 25% Lighter", so
        // changing the theme's Accent 3 updates every use of it throughout the document.
        //
        // System default, baked into the app (not loaded from any file unless the user
        // explicitly loads a theme JSON to override it). Index 0/1 are reserved as the
        // neutral ink/grey anchors (matching the diagram's own restrained-mode neutrals);
        // 2-7 are the working accent hues.
        let themePalette = ['#1c2127', '#7c8694', '#c0533e', '#1f8a5f', '#2563eb', '#7c3aed', '#d97706', '#0891b2'];

        // System theme presets: ready-made 8-color palettes a person can switch to as a
        // starting point, then still customize individual slots afterward via the gradient/
        // RGB editor (picking a preset is not a one-way door — it just sets themePalette to
        // a new starting array, identical in every way to a person manually re-typing 8 hex
        // values). Each preset follows the SAME structural role per slot as the original
        // default, deliberately: slot 0 is always a near-black/darkest "ink" neutral, slot 1
        // a mid-tone neutral, slots 2-7 are the working accent hues. This matters because
        // Restrained mode's semantic coloring (profit=green-ish, cost=red/warm-ish) reads
        // best when slot 2/3 stay roughly in that family across themes — Branded mode
        // ignores this entirely and just uses whatever 8 colors are assigned, so it's a soft
        // convention for Restrained-mode legibility, not a hard requirement.
        //
        // Winter and Industrial each went through one real revision before being finalized:
        // initial drafts had 3-4 colors per palette that were too close in hue/lightness to
        // tell apart at a glance in an actual diagram (several blue-greys in Winter reading
        // as near-identical, several muted earth tones in Industrial doing the same) —
        // caught by rendering actual swatch grids side by side, not by eye on individual
        // hex values, and revised for real visual separation before being finalized here.
        const SYSTEM_THEMES = {
            'Default': ['#1c2127', '#7c8694', '#c0533e', '#1f8a5f', '#2563eb', '#7c3aed', '#d97706', '#0891b2'],
            'Neon': ['#0a0014', '#5b5b7a', '#ff2e88', '#00f5a0', '#7c3aff', '#00d4ff', '#ffb800', '#ff5ee8'],
            'Natural': ['#2e2a22', '#8c8273', '#a8553a', '#5c7a4f', '#3d6b6b', '#8a9b4f', '#c19a4b', '#6b8e8e'],
            'Spring': ['#3a3530', '#a39c8f', '#e8889a', '#7fb069', '#f4a896', '#9bc4cc', '#f7d486', '#c9a8d4'],
            'Summer': ['#2b2419', '#a39477', '#e8542e', '#2e8b57', '#2196c4', '#f4c430', '#ff7f50', '#1ba39c'],
            'Autumn': ['#2e1f17', '#9c8773', '#c1440e', '#8a6d2f', '#a85c32', '#6b4226', '#d4943b', '#7a4419'],
            'Winter': ['#0f1f2e', '#7793a8', '#3a6ea5', '#8fb8d6', '#1e4d6b', '#c4d8e8', '#5b4e8a', '#2e7d8c'],
            'Industrial': ['#1a1a1a', '#8a8a8a', '#b8451f', '#5a6e2e', '#2e4a5c', '#c9a04a', '#4a4a4a', '#9b6b3f'],
        };

        function applySystemTheme(themeName) {
            const preset = SYSTEM_THEMES[themeName];
            if (!preset) return;
            themePalette = [...preset];
            saveToLocalStorage();
            renderNodes();
            generateDiagram();
            syncSystemThemeSelect();
        }

        // The <select> should reflect reality: if every slot in themePalette currently
        // matches a preset exactly, show that preset selected; if the person has since
        // edited any individual color away from the preset they started from, show
        // "Custom" rather than leaving a stale preset name selected that no longer
        // accurately describes the palette.
        function detectCurrentSystemTheme() {
            for (const [name, preset] of Object.entries(SYSTEM_THEMES)) {
                if (preset.every((hex, i) => hex.toLowerCase() === (themePalette[i] || '').toLowerCase())) {
                    return name;
                }
            }
            return null;
        }

        function syncSystemThemeSelect() {
            const select = document.getElementById('system-theme-select');
            if (!select) return;
            const detected = detectCurrentSystemTheme();
            select.value = detected || '__custom__';
        }
        // Exact Microsoft Office picker percentages (not arbitrary mix amounts). Lighter
        // tints move the base color toward white by this fraction; darker shades move it
        // toward black. Order here is darkest-tint-first only because that's the order the
        // popover grid renders top-to-bottom for the lightest-at-top layout — see
        // buildColorPopover().
        const THEME_TINT_PERCENTS = [0.80, 0.60, 0.40, 0.25, 0.10]; // "tint4".."tint0", lightest to least-light
        const THEME_SHADE_PERCENTS = [0.25, 0.50]; // "shade0".."shade1", least-dark to darkest

        function mixToward(hex, target, amount) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            const mix = (c) => Math.round(c + (target - c) * amount).toString(16).padStart(2, '0');
            return '#' + mix(r) + mix(g) + mix(b);
        }

        // variant is 'base', 'tint0'..'tint4' (tint0 = 10% lighter ... tint4 = 80% lighter),
        // or 'shade0'..'shade1' (shade0 = 25% darker, shade1 = 50% darker).
        function deriveVariant(baseHex, variant) {
            if (!variant || variant === 'base') return baseHex;
            if (variant.startsWith('tint')) {
                const i = parseInt(variant.slice(4), 10);
                return mixToward(baseHex, 255, THEME_TINT_PERCENTS[4 - i]);
            }
            if (variant.startsWith('shade')) {
                const i = parseInt(variant.slice(5), 10);
                return mixToward(baseHex, 0, THEME_SHADE_PERCENTS[i]);
            }
            return baseHex;
        }

        // Resolves a node's color reference ({themeIndex, variant}) to an actual hex, live
        // against the current themePalette. Falls back to a sensible neutral if the
        // reference is missing or out of range (shouldn't happen via the UI, but keeps
        // hand-edited/older JSON from crashing the renderer).
        function resolveThemeColor(colorRef) {
            if (!colorRef || typeof colorRef.themeIndex !== 'number') return '#7c8694';
            const base = themePalette[colorRef.themeIndex];
            if (!base) return '#7c8694';
            return deriveVariant(base, colorRef.variant);
        }

        function saveToLocalStorage() {
            try {
                const payload = { globalOpacityValue, paletteMode, ribbonStyle, diagramAspect, themePalette, showValues, showPassThrough };
                if (isV3Mode()) {
                    payload.seriesColumns = seriesColumns;
                    payload.seriesModel   = seriesModel;
                    payload.seriesFlows   = seriesFlows;
                } else {
                    payload.links = links;
                    payload.nodeRegistry = nodeRegistry;
                    payload.nodeLabels   = nodeLabels;
                    payload.columnLabels = columnLabels;
                }
                localStorage.setItem('sankeyWorkspaceData_v15', JSON.stringify(payload));
            } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('sankeyWorkspaceData_v15');
                if (saved) {
                    const data = JSON.parse(saved);
                    globalOpacityValue = data.globalOpacityValue !== undefined ? data.globalOpacityValue : 0.45;
                    paletteMode = data.paletteMode === 'branded' ? 'branded' : 'restrained';
                    ribbonStyle = ['standard', 'classic', 'modern'].includes(data.ribbonStyle) ? data.ribbonStyle : 'standard';
                    diagramAspect = ['4:3','16:9','portrait'].includes(data.diagramAspect) ? data.diagramAspect : '16:9';
                    showValues      = data.showValues      !== undefined ? !!data.showValues      : true;
                    showPassThrough = data.showPassThrough !== undefined ? !!data.showPassThrough : true;
                    if (Array.isArray(data.themePalette) && data.themePalette.length === 8) themePalette = data.themePalette;
                    if (data.seriesModel) {
                        seriesColumns = data.seriesColumns || [];
                        seriesModel   = data.seriesModel;
                        seriesFlows   = data.seriesFlows || [];
                        nodes = []; links = []; columnLabels = []; nodeRegistry = {}; nodeLabels = {};
                    } else {
                        links = data.links || [];
                        columnLabels = Array.isArray(data.columnLabels) ? data.columnLabels : [];
                        nodeRegistry = data.nodeRegistry || {};
                        nodeLabels   = data.nodeLabels   || {};
                        // Rebuild nodeRegistry from saved nodes array if no nodeRegistry saved
                        if (!data.nodeRegistry && Array.isArray(data.nodes)) {
                            data.nodes.forEach(n => { nodeRegistry[n.name] = { color: n.color }; });
                        }
                        syncNodesFromRegistry();
                        seriesColumns = null; seriesModel = null; seriesFlows = null;
                    }
                }
            } catch (e) {}
        }

        function updateCanvasOpacity(value) {
            globalOpacityValue = parseFloat(value) / 100;
            document.getElementById('opacity-slider-readout').innerText = value + '%';
            generateDiagram();
            saveToLocalStorage();
        }

        function renderColumnLabelInputs(numCols) {
            const row = document.getElementById('col-labels-row');
            if (!row) return;
            // In flat (non-v3) mode, only show if the user has actually set at least one label
            const hasAnyLabel = columnLabels.some(l => l && l.trim());
            if (!numCols || numCols < 2 || (!isV3Mode() && !hasAnyLabel)) {
                row.style.display = 'none';
                return;
            }
            row.style.display = 'flex';
            // Preserve focus state: if user is typing in an input, don't obliterate it.
            // Only fully rebuild if the column count changed; otherwise just refresh values.
            const existing = row.querySelectorAll('.col-label-input');
            if (existing.length !== numCols) {
                row.innerHTML = `<span class="col-labels-row-title">Column labels</span>`;
                for (let c = 0; c < numCols; c++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'col-label-input';
                    input.value = columnLabels[c] || '';
                    input.placeholder = `Col ${c + 1}`;
                    input.maxLength = 24;
                    input.dataset.col = c;
                    input.addEventListener('input', function() {
                        const col = parseInt(this.dataset.col, 10);
                        columnLabels[col] = this.value;
                        saveToLocalStorage();
                        generateDiagram();
                    });
                    row.appendChild(input);
                }
            } else {
                existing.forEach((input, i) => {
                    if (document.activeElement !== input) {
                        input.value = columnLabels[i] || '';
                    }
                });
            }
        }


        function setPaletteMode(mode) {
            paletteMode = mode === 'branded' ? 'branded' : 'restrained';
            document.getElementById('palette-restrained-btn').classList.toggle('is-active', paletteMode === 'restrained');
            document.getElementById('palette-branded-btn').classList.toggle('is-active', paletteMode === 'branded');
            generateDiagram();
            saveToLocalStorage();
        }

        function setDiagramAspect(aspect) {
            diagramAspect = ['4:3','16:9','portrait'].includes(aspect) ? aspect : '16:9';
            document.querySelectorAll('.aspect-btn').forEach(b => {
                b.classList.toggle('is-active', b.dataset.aspect === diagramAspect);
            });
            applyLandscapeClass();
            saveToLocalStorage();
            generateDiagram();
        }

        function applyLandscapeClass() {
            const grid = document.querySelector('.sankey-layout-grid');
            if (grid) grid.classList.toggle('diagram-landscape', diagramAspect !== 'portrait');
        }

        function setRibbonStyle(style) {
            ribbonStyle = ['standard', 'classic', 'modern'].includes(style) ? style : 'standard';
            document.getElementById('style-standard-btn').classList.toggle('is-active', ribbonStyle === 'standard');
            document.getElementById('style-classic-btn').classList.toggle('is-active', ribbonStyle === 'classic');
            document.getElementById('style-modern-btn').classList.toggle('is-active', ribbonStyle === 'modern');
            generateDiagram();
            saveToLocalStorage();
        }

        function toggleShowValues() {
            showValues = !showValues;
            const btn = document.getElementById('show-values-btn');
            if (btn) {
                btn.classList.toggle('is-active', showValues);
                btn.textContent = showValues ? 'Values' : 'Names';
            }
            generateDiagram();
            saveToLocalStorage();
        }

        function togglePassThrough() {
            showPassThrough = !showPassThrough;
            const btn = document.getElementById('pass-through-btn');
            if (btn) {
                // Label describes what clicking again will do:
                // currently expanded → button says "Collapse"; currently collapsed → "Expand"
                btn.classList.toggle('is-active', showPassThrough);
                btn.textContent = showPassThrough ? 'Collapse' : 'Expand';
            }
            generateDiagram();
            saveToLocalStorage();
        }

        // Compute the pass-through collapsed version of nodes/links.
        // A node is a "pass-through" if: it has exactly one unique displayName chain
        // where in@value == out@value and the displayName is identical to an adjacent node.
        // In practice: nodes with the same displayName appearing in adjacent columns
        // where inflow == outflow are collapsed — the source's links skip directly to
        // the pass-through node's targets.
        function computePassThroughGraph(origNodes, origLinks) {
            // Expanded mode: return data unchanged
            if (showPassThrough) return { nodes: origNodes, links: origLinks, fullNodes: origNodes, fullLinks: origLinks };

            // Collapsed mode: remove pure pass-through nodes — nodes where every unit
            // that flows in also flows straight back out to a SINGLE successor that shares
            // the same display name (e.g. Aviva@1 whose only outbound link is to Aviva@2).
            //
            // Detection rules for a collapsible pass-through node N:
            //   1. N has exactly ONE outbound link (to a single successor S).
            //   2. The display name of N equals the display name of S.
            //   3. Total inflow into N == value of the single outbound link (pure pass-through).
            //
            // When N is collapsed: every inbound link X→N is rewritten as X→S instead.
            // The link N→S itself is dropped. S keeps all its other inbound/outbound links.
            //
            // This is applied iteratively so chains longer than two (e.g. A@1→A@2→A@3) fully
            // collapse in a single call (each iteration removes one layer until no more remain).

            // Helper: display name for a node (mirrors displayNameFor() from the render layer)
            const nodeMap = {};
            origNodes.forEach(n => { nodeMap[n.name] = n; });
            function dispName(nodeName) {
                const n = nodeMap[nodeName];
                if (!n) return nodeName.replace(/@\d+$/, '');
                if (n.label !== undefined) return n.label;
                if (n.displayName && n.displayName.trim()) return n.displayName.trim();
                return nodeName.replace(/@\d+$/, '');
            }

            let nodes = origNodes.slice();
            let links = origLinks.slice();

            let changed = true;
            while (changed) {
                changed = false;

                // Build adjacency info fresh each pass
                const outLinks = {};   // nodeName → [link, ...]
                const inLinks  = {};   // nodeName → [link, ...]
                nodes.forEach(n => { outLinks[n.name] = []; inLinks[n.name] = []; });
                links.forEach(l => {
                    if (outLinks[l.source]) outLinks[l.source].push(l);
                    if (inLinks[l.target])  inLinks[l.target].push(l);
                });

                const removeSet = new Set();
                const redirect  = {};  // removedNode → successorName

                nodes.forEach(n => {
                    const outs = outLinks[n.name] || [];
                    const ins  = inLinks[n.name]  || [];
                    if (ins.length === 0) return;   // source node — never collapse
                    if (outs.length !== 1) return;  // must have exactly one outbound link

                    const successor = outs[0].target;
                    if (successor === n.name) return; // self-loop guard

                    // Display names must match
                    if (dispName(n.name) !== dispName(successor)) return;

                    // Total inflow must equal the single outbound value (pure pass-through)
                    const totalIn  = ins.reduce((s, l) => s + l.value, 0);
                    const totalOut = outs[0].value;
                    if (Math.abs(totalIn - totalOut) > 1e-9) return;

                    removeSet.add(n.name);
                    redirect[n.name] = successor;
                });

                if (removeSet.size === 0) break;

                // Rewrite links: X → removed becomes X → redirect[removed]
                const newLinks = [];
                links.forEach(l => {
                    if (removeSet.has(l.source)) return; // drop the N→S link itself
                    if (removeSet.has(l.target)) {
                        // Redirect X → removed  to  X → successor
                        // Merge with an existing X→successor link if one was already added
                        const newTarget = redirect[l.target];
                        const existing = newLinks.find(x => x.source === l.source && x.target === newTarget);
                        if (existing) {
                            existing.value += l.value;
                        } else {
                            newLinks.push({ source: l.source, target: newTarget, value: l.value, color: l.color });
                        }
                    } else {
                        newLinks.push(l);
                    }
                });

                nodes = nodes.filter(n => !removeSet.has(n.name));
                links = newLinks;
                changed = true; // run another pass to catch chains
            }

            // Pin each surviving node to its column rank from the *original* expanded graph.
            // Without this, collapsed successors (e.g. Aviva@2) get pulled left by
            // assignColumns because their only predecessor is now Bundled Providers (rank 0),
            // placing them at rank 1 instead of rank 2 where they sat in expanded mode.
            // Stamping the original rank as node.column forces assignColumns to keep them right.
            const origRank = assignColumnsRaw(origNodes.map(n => n.name), origLinks);
            nodes = nodes.map(n => {
                const r = origRank[n.name];
                if (r === undefined) return n;
                // Only override if not already manually pinned by the user
                if (typeof n.column === 'number') return n;
                return { ...n, column: r };
            });

            return { nodes, links, fullNodes: origNodes, fullLinks: origLinks };
        }

        // Thin wrapper used by computePassThroughGraph before generateDiagram's local
        // assignColumns closure exists — same algorithm, operates on raw name/link arrays.
        function assignColumnsRaw(nodeNames, links) {
            const rank = {};
            nodeNames.forEach(n => { rank[n] = 0; });
            const incoming = {};
            nodeNames.forEach(n => { incoming[n] = []; });
            links.forEach(l => { if (incoming[l.target]) incoming[l.target].push(l.source); });
            let changed = true;
            while (changed) {
                changed = false;
                for (const n of nodeNames) {
                    if (!incoming[n].length) continue;
                    const maxP = Math.max(...incoming[n].map(p => rank[p] !== undefined ? rank[p] : 0));
                    if (maxP + 1 > rank[n]) { rank[n] = maxP + 1; changed = true; }
                }
            }
            return rank;
        }

        // ---- V3 editor mode switching ----
        // ---- Grid + Transfers render ----

        function renderGrid() {
            const head = document.getElementById('grid-head');
            const body = document.getElementById('grid-body');
            if (!head || !body) return;

            const cols = seriesColumns || [];
            const series = seriesModel || [];

            // Header row: empty series-name cell + one cell per column (editable label) + delete spacer
            let headHtml = '<tr>';
            headHtml += '<th style="text-align:left; padding-left:10px; min-width:150px;"></th>';
            cols.forEach((col, ci) => {
                headHtml += `<th>
                    <div style="display:flex; align-items:center; gap:3px; justify-content:center;">
                        <input type="text" class="grid-col-label-input" value="${escapeAttr(col.label || '')}"
                               placeholder="Label" maxlength="20"
                               onchange="updateSeriesColumn(${ci}, 'label', this.value)"
                               title="Column label">
                        <button onclick="removeSeriesColumn(${ci})" class="grid-delete-btn" title="Remove column"
                                style="opacity:0.4;" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0.4">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </th>`;
            });
            headHtml += '<th style="width:24px;"></th></tr>';
            head.innerHTML = headHtml;

            // Body rows: one per series
            body.innerHTML = '';
            if (series.length === 0) {
                body.innerHTML = `<tr><td colspan="${cols.length + 2}" style="padding:24px; text-align:center; color:#b3ad9c; font-size:12px;">
                    No series yet — click + to add one
                </td></tr>`;
                return;
            }
            series.forEach((s, si) => {
                const tr = document.createElement('tr');
                let rowHtml = `<td>
                    <div class="grid-series-cell">
                        <button type="button" class="swatch-trigger" style="background:${resolveThemeColor(s.color)}; flex-shrink:0;"
                                onclick="openSeriesColorPickerGrid(this, ${si})" title="Change color"></button>
                        <input type="text" value="${escapeAttr(s.name)}" class="grid-series-name"
                               onchange="updateSeriesName(${si}, this.value)"
                               onblur="updateSeriesName(${si}, this.value)">
                    </div>
                </td>`;
                cols.forEach(col => {
                    const val = s.values[col.id] !== undefined ? s.values[col.id] : '';
                    rowHtml += `<td class="grid-value-cell">
                        <input type="number" class="grid-value-input" value="${val}" placeholder="—"
                               min="0" step="any"
                               onchange="updateSeriesValue(${si}, ${col.id}, this.value)"
                               onblur="updateSeriesValue(${si}, ${col.id}, this.value)">
                    </td>`;
                });
                rowHtml += `<td style="padding:0 4px; width:24px;">
                    <button onclick="deleteSeries(${si})" class="grid-delete-btn" title="Delete series">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </td>`;
                tr.innerHTML = rowHtml;
                body.appendChild(tr);
            });
        }

        function renderTransfers() {
            const list = document.getElementById('transfers-list');
            if (!list) return;
            const transfers = seriesFlows || [];
            const seriesNames = (seriesModel || []).map(s => s.name);
            const cols = seriesColumns || [];

            if (transfers.length === 0) {
                list.innerHTML = `<p style="font-size:11px; color:#b3ad9c; padding:4px 2px;">
                    None — carry-forwards between columns are automatic.
                </p>`;
                return;
            }

            list.innerHTML = '';
            transfers.forEach((t, ti) => {
                const div = document.createElement('div');
                div.className = 'transfer-row';

                const makeSeriesSelect = (field, val) => {
                    const opts = seriesNames.map(n =>
                        `<option value="${escapeAttr(n)}"${n === val ? ' selected' : ''}>${escapeAttr(n)}</option>`
                    ).join('');
                    return `<select class="transfer-select" onchange="updateTransfer(${ti}, '${field}', this.value)">${opts}</select>`;
                };
                const makeColSelect = (field, val) => {
                    const opts = cols.map(c => {
                        const lbl = c.label || `Col ${c.id}`;
                        return `<option value="${c.id}"${c.id === val ? ' selected' : ''}>${escapeAttr(lbl)}</option>`;
                    }).join('');
                    return `<select class="transfer-col-select" onchange="updateTransfer(${ti}, '${field}', parseInt(this.value))">${opts}</select>`;
                };

                div.innerHTML = `
                    ${makeSeriesSelect('from', t.from)}
                    ${makeColSelect('fromCol', t.fromCol)}
                    <span class="transfer-arrow">→</span>
                    ${makeSeriesSelect('to', t.to)}
                    ${makeColSelect('toCol', t.toCol)}
                    <input type="number" class="transfer-value-input" value="${t.value}" min="0" step="any"
                           onchange="updateTransfer(${ti}, 'value', parseFloat(this.value) || 0)">
                    <button onclick="deleteTransfer(${ti})" class="btn-icon row-delete" style="opacity:0.5;" title="Delete transfer">
                        <i class="fa-solid fa-xmark text-xs"></i>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        // Master render for the whole data panel (v3 mode)
        function renderDataPanel() {
            renderGrid();
            renderTransfers();
        }

        // ---- V3 CRUD ----
        function addSeriesColumn() {
            if (!seriesColumns) return;
            const nextId = seriesColumns.length ? Math.max(...seriesColumns.map(c => c.id)) + 1 : 0;
            seriesColumns.push({ id: nextId, label: '' });
            renderDataPanel(); saveToLocalStorage(); generateDiagram();
        }
        function removeSeriesColumn(ci) {
            const colId = seriesColumns[ci].id;
            seriesColumns.splice(ci, 1);
            (seriesModel || []).forEach(s => delete s.values[colId]);
            seriesFlows = (seriesFlows || []).filter(f => f.fromCol !== colId && f.toCol !== colId);
            renderDataPanel(); saveToLocalStorage(); generateDiagram();
        }
        function updateSeriesColumn(ci, field, val) {
            seriesColumns[ci][field] = val;
            renderTransfers();
            renderColumnLabelInputs(seriesColumns.length);
            saveToLocalStorage(); generateDiagram();
        }
        function addSeries() {
            if (!seriesModel) return;
            const themeOrder = [2, 3, 4, 5, 6, 7, 0, 1];
            const ti = themeOrder[seriesModel.length % themeOrder.length];
            seriesModel.push({ name: `Series ${seriesModel.length + 1}`, color: { themeIndex: ti, variant: 'base' }, values: {} });
            renderGrid(); saveToLocalStorage(); generateDiagram();
            // Focus the new name input
            const rows = document.querySelectorAll('#grid-body tr');
            const lastRow = rows[rows.length - 1];
            if (lastRow) { const inp = lastRow.querySelector('.grid-series-name'); if (inp) { inp.focus(); inp.select(); } }
        }
        function updateSeriesName(si, newName) {
            const trimmed = newName.trim();
            if (!trimmed || trimmed === seriesModel[si].name) return;
            const old = seriesModel[si].name;
            seriesModel[si].name = trimmed;
            (seriesFlows || []).forEach(f => {
                if (f.from === old) f.from = trimmed;
                if (f.to === old) f.to = trimmed;
            });
            renderTransfers(); saveToLocalStorage(); generateDiagram();
        }
        function updateSeriesValue(si, colId, rawVal) {
            const trimmed = String(rawVal).trim();
            const v = parseFloat(trimmed);
            if (trimmed === '' || isNaN(v) || v < 0) delete seriesModel[si].values[colId];
            else seriesModel[si].values[colId] = v;
            saveToLocalStorage(); generateDiagram();
        }
        function deleteSeries(si) {
            const name = seriesModel[si].name;
            seriesModel.splice(si, 1);
            seriesFlows = (seriesFlows || []).filter(f => f.from !== name && f.to !== name);
            renderDataPanel(); saveToLocalStorage(); generateDiagram();
        }
        function openSeriesColorPickerGrid(triggerEl, si) {
            openColorPicker(triggerEl, seriesModel[si].color, ref => {
                seriesModel[si].color = ref;
                triggerEl.style.background = resolveThemeColor(ref);
                saveToLocalStorage(); generateDiagram();
            });
        }
        function addTransfer() {
            if (!seriesModel || seriesModel.length < 1) return;
            if (!seriesColumns || seriesColumns.length < 2) return;
            const colIds = seriesColumns.map(c => c.id).sort((a, b) => a - b);
            seriesFlows.push({ from: seriesModel[0].name, fromCol: colIds[0], to: seriesModel[0].name, toCol: colIds[1], value: 0 });
            renderTransfers(); saveToLocalStorage(); generateDiagram();
        }
        function updateTransfer(ti, field, val) {
            seriesFlows[ti][field] = val;
            saveToLocalStorage(); generateDiagram();
        }
        function deleteTransfer(ti) {
            seriesFlows.splice(ti, 1);
            renderTransfers(); saveToLocalStorage(); generateDiagram();
        }

        // ============================================================
        // SMART TABLE — the primary input UI
        // Nodes are created implicitly: every unique name typed in a
        // Source or Target cell becomes a node with an auto-assigned
        // color. Clicking the color dot opens the existing color picker.
        // ============================================================

        // Node registry: maps name → {color}. This is the single source
        // of truth for node colors. links[] stays as-is (source/target names).
        // On every table change: sync nodes[] from the registry, then render.
        let nodeRegistry = {}; // { "Aviva": { color: {themeIndex, variant} } }
        let nodeLabels   = {}; // { "Aviva": "custom label" } — "" means suppress; undefined means use name

        const THEME_ORDER = [2, 3, 4, 5, 6, 7, 0, 1];
        function nextAutoColor() {
            const used = Object.keys(nodeRegistry).length;
            const ti = THEME_ORDER[used % THEME_ORDER.length];
            return { themeIndex: ti, variant: 'base' };
        }

        function ensureNode(name) {
            if (!name || !name.trim()) return;
            const key = name.trim();
            if (!nodeRegistry[key]) {
                nodeRegistry[key] = { color: nextAutoColor() };
            }
        }

        // Rebuild nodes[] from nodeRegistry + current link names
        function syncNodesFromRegistry() {
            const usedNames = new Set();
            links.forEach(l => { if (l.source) usedNames.add(l.source); if (l.target) usedNames.add(l.target); });
            nodes = [];
            usedNames.forEach(name => {
                ensureNode(name);
                const n = { name, color: nodeRegistry[name].color };
                if (nodeLabels[name] !== undefined) n.label = nodeLabels[name]; // "" = suppress
                nodes.push(n);
            });
        }

        // ---- Smart table render ----
        function renderSmartTable() {
            const tbody = document.getElementById('smart-table-body');
            if (!tbody) return;
            tbody.innerHTML = '';

            // Render each existing link row
            links.forEach((link, i) => {
                tbody.appendChild(buildSmartRow(i, link.source, link.target, link.value));
            });

            // Always append one blank sentinel row at the bottom
            tbody.appendChild(buildSmartRow(-1, '', '', ''));
        }

        function buildSmartRow(rowIndex, sourceName, targetName, value) {
            const tr = document.createElement('tr');
            tr.dataset.rowIndex = rowIndex;
            if (rowIndex >= 0) {
                tr.addEventListener('mouseenter', () => highlightRibbon(rowIndex, true));
                tr.addEventListener('mouseleave', () => highlightRibbon(rowIndex, false));
            }

            const sourceColor = sourceName && nodeRegistry[sourceName] ? resolveThemeColor(nodeRegistry[sourceName].color) : null;
            const targetColor = targetName && nodeRegistry[targetName] ? resolveThemeColor(nodeRegistry[targetName].color) : null;

            tr.innerHTML = `
                <td>
                    <div class="node-cell">
                        <span class="node-dot ${sourceColor ? '' : 'unset'}"
                              style="${sourceColor ? `background:${sourceColor}` : ''}"
                              data-node="${escapeAttr(sourceName)}"
                              onclick="openNodeColorDot(this)"></span>
                        <input class="node-input" type="text" value="${escapeAttr(sourceName)}"
                               placeholder="Source"
                               data-field="source" data-row="${rowIndex}"
                               autocomplete="off"
                               oninput="onNodeInput(this)"
                               onblur="onNodeBlur(this)"
                               onkeydown="onNodeKey(event, this)">
                    </div>
                </td>
                <td class="td-arrow">→</td>
                <td>
                    <div class="node-cell">
                        <span class="node-dot ${targetColor ? '' : 'unset'}"
                              style="${targetColor ? `background:${targetColor}` : ''}"
                              data-node="${escapeAttr(targetName)}"
                              onclick="openNodeColorDot(this)"></span>
                        <input class="node-input" type="text" value="${escapeAttr(targetName)}"
                               placeholder="Target"
                               data-field="target" data-row="${rowIndex}"
                               autocomplete="off"
                               oninput="onNodeInput(this)"
                               onblur="onNodeBlur(this)"
                               onkeydown="onNodeKey(event, this)">
                    </div>
                </td>
                <td class="td-value">
                    <input class="value-input" type="number" value="${value !== '' ? value : ''}"
                           placeholder="0" min="0" step="any"
                           data-row="${rowIndex}"
                           onchange="onValueChange(this)"
                           onblur="onValueChange(this)"
                           onfocus="onSentinelFocus(this)">
                </td>
                <td class="td-del">
                    ${rowIndex >= 0 ? `<button class="row-del-btn" onclick="deleteSmartRow(${rowIndex})" title="Delete row">
                        <i class="fa-solid fa-xmark"></i>
                    </button>` : ''}
                </td>
            `;
            return tr;
        }

        // ---- Autocomplete ----
        let acActiveInput = null;
        let acActiveIndex = -1;

        function onNodeInput(input) {
            const val = input.value;
            const rowIndex = parseInt(input.dataset.row, 10);

            // If this is the sentinel row and user starts typing, materialise it
            if (rowIndex < 0 && val.trim()) {
                materializeSentinel(input);
                return;
            }

            showAutocomplete(input, val);
        }

        function showAutocomplete(input, query) {
            const ac = document.getElementById('node-autocomplete');
            const allNames = Object.keys(nodeRegistry).filter(n => n !== input.value);
            const matches = query.trim()
                ? allNames.filter(n => n.toLowerCase().includes(query.toLowerCase()))
                : allNames;

            if (matches.length === 0) { ac.style.display = 'none'; return; }

            const rect = input.getBoundingClientRect();
            ac.style.display = 'block';
            ac.style.left = rect.left + 'px';
            ac.style.top = (rect.bottom + 4) + 'px';
            ac.style.width = Math.max(rect.width, 160) + 'px';
            acActiveInput = input;
            acActiveIndex = -1;

            ac.innerHTML = matches.map((name, i) => {
                const color = nodeRegistry[name] ? resolveThemeColor(nodeRegistry[name].color) : '#e7e3d8';
                return `<div class="autocomplete-item" data-name="${escapeAttr(name)}" onclick="selectAutocomplete('${escapeAttr(name)}')">
                    <span class="autocomplete-dot" style="background:${color}"></span>
                    ${escapeHtml(name)}
                </div>`;
            }).join('');
        }

        function selectAutocomplete(name) {
            if (!acActiveInput) return;
            acActiveInput.value = name;
            hideAutocomplete();
            onNodeBlur(acActiveInput);
        }

        function hideAutocomplete() {
            document.getElementById('node-autocomplete').style.display = 'none';
            acActiveInput = null;
            acActiveIndex = -1;
        }

        function onNodeKey(e, input) {
            const ac = document.getElementById('node-autocomplete');
            if (ac.style.display === 'none') return;
            const items = ac.querySelectorAll('.autocomplete-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
                items.forEach((it, i) => it.classList.toggle('is-active', i === acActiveIndex));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                acActiveIndex = Math.max(acActiveIndex - 1, 0);
                items.forEach((it, i) => it.classList.toggle('is-active', i === acActiveIndex));
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                if (acActiveIndex >= 0 && items[acActiveIndex]) {
                    e.preventDefault();
                    selectAutocomplete(items[acActiveIndex].dataset.name);
                } else {
                    hideAutocomplete();
                }
            } else if (e.key === 'Escape') {
                hideAutocomplete();
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#node-autocomplete') && !e.target.closest('.node-input')) {
                hideAutocomplete();
            }
        }, true);

        // ---- Row materialise / blur / delete ----
        function materializeSentinel(inputInSentinel) {
            // Add a new blank link and re-render; focus will be restored by the caller
            const row = inputInSentinel.closest('tr');
            const field = inputInSentinel.dataset.field;
            const val = inputInSentinel.value.trim();
            links.push({ source: field === 'source' ? val : '', target: field === 'target' ? val : '', value: 0 });
            ensureNode(val);
            syncNodesFromRegistry();
            renderSmartTable();
            saveToLocalStorage();
            generateDiagram();
            // Re-focus the correct input in the new row
            const newRow = document.querySelector(`#smart-table-body tr[data-row-index="${links.length - 1}"]`);
            if (newRow) {
                const inp = newRow.querySelector(`input[data-field="${field}"]`);
                if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
            }
        }

        function onNodeBlur(input) {
            setTimeout(() => {
