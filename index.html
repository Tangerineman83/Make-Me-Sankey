<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Me Sankey!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }
        
        .interactive-row { transition: all 0.15s ease; }
        .interactive-row:hover { background-color: #f8fafc; }

        /* Premium blend filter override to ensure cross-tier flows pop beautifully on transparent backdrops */
        .sankey-link {
            mix-blend-mode: multiply !important;
            transition: opacity 0.15s ease;
        }
        .sankey-link:hover {
            opacity: 1.0 !important;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen">

    <div class="max-w-[1600px] mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 pb-6 border-b border-slate-200">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-sm">
                        <i class="fa-solid fa-diagram-project text-base"></i>
                    </div>
                    <h1 class="text-3xl font-bold title-font text-slate-900 tracking-tight">Make Me Sankey!</h1>
                </div>
                <p class="text-slate-500 mt-1.5 text-sm">Design crisp, high-resolution flow models instantly onto clean transparent layers.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importJSON()" class="flex items-center gap-2 px-3.5 py-2 text-xs sm:text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all">
                        <i class="fa-solid fa-file-import text-slate-400"></i>
                        <span>Import</span>
                    </button>
                    <button onclick="exportJSON()" class="flex items-center gap-2 px-3.5 py-2 text-xs sm:text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all">
                        <i class="fa-solid fa-file-code text-slate-400"></i>
                        <span>Export Data</span>
                    </button>
                </div>

                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="generateDiagram()" class="flex items-center gap-2 px-4 py-2 bg-slate-900 hover:bg-black text-white text-xs sm:text-sm font-semibold rounded-lg transition-all shadow-sm">
                        <i class="fa-solid fa-rotate"></i>
                        <span>Render Layout</span>
                    </button>
                    <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                    <button onclick="exportSVG()" class="p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all" title="Export Vector SVG">
                        <i class="fa-solid fa-vector-square"></i>
                    </button>
                    <button onclick="exportPNG()" class="p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all" title="Export Ultra-High-Res PNG">
                        <i class="fa-solid fa-image"></i>
                    </button>
                </div>

                <button onclick="resetAll()" class="px-3.5 py-2 text-xs sm:text-sm font-medium text-rose-600 hover:bg-rose-50 rounded-xl border border-rose-200 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-trash-can text-xs"></i>
                    <span>Clear Workspace</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-3 glass-card p-5 shadow-sm bg-white">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight flex items-center gap-2">
                            <span>Nodes</span>
                            <span id="node-count-badge" class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-mono font-medium">0</span>
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Label structural targets</p>
                    </div>
                    <button onclick="addNode()" class="w-8 h-8 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-lg transition-all flex items-center justify-center border border-slate-200">
                        <i class="fa-solid fa-plus text-sm"></i>
                    </button>
                </div>
                <div id="nodes-list" class="space-y-2.5 max-h-[580px] overflow-y-auto pr-1"></div>
            </div>

            <div class="lg:col-span-4 glass-card p-5 shadow-sm bg-white flex flex-col">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Flow Mapping</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Link mapping intersections</p>
                    </div>
                    <button onclick="addFlowRow()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-xs font-medium rounded-lg transition-all">
                        <i class="fa-solid fa-circle-plus text-xs"></i>
                        <span>Add Flow</span>
                    </button>
                </div>
                
                <div class="flex-1 overflow-x-auto border border-slate-200 rounded-xl bg-white">
                    <table class="w-full text-xs min-w-[360px]">
                        <thead class="bg-slate-50 text-slate-500 font-semibold uppercase tracking-wider border-b border-slate-200 sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-2.5 text-left font-medium">Source</th>
                                <th class="px-3 py-2.5 text-left font-medium">Target</th>
                                <th class="px-3 py-2.5 text-left font-medium w-24">Value</th>
                                <th class="w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="flows-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-5 glass-card p-5 shadow-sm flex flex-col min-h-[540px]">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Sankey Output Canvas</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Seamless transparent layer rendering</p>
                    </div>
                    
                    <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 shadow-inner">
                        <span class="text-xs font-semibold text-slate-500">Mid-Flow Density:</span>
                        <input type="range" id="global-opacity-slider" min="25" max="100" value="70" 
                               class="w-24 accent-slate-900 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                               oninput="updateCanvasOpacity(this.value)">
                        <span id="opacity-slider-readout" class="text-xs font-mono font-bold text-slate-700 min-w-[34px] text-right">70%</span>
                    </div>
                </div>
                
                <div class="flex-1 bg-transparent p-2 rounded-xl border border-dashed border-slate-200 flex items-center justify-center min-h-[460px]">
                    <div id="sankey-chart" class="w-full h-full"></div>
                </div>
            </div>
            
        </div>
    </div>

    <input type="file" id="json-file-input" accept=".json" class="hidden">

    <script>
        let nodes = [];
        let links = [];
        let chartDiv = null;
        let globalOpacityValue = 0.70;

        function generateUUID() {
            return 'inline-grad-' + Math.random().toString(36).substr(2, 9);
        }

        function saveToLocalStorage() {
            try { localStorage.setItem('sankeyWorkspaceData_v9', JSON.stringify({ nodes, links, globalOpacityValue })); } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('sankeyWorkspaceData_v9');
                if (saved) {
                    const data = JSON.parse(saved);
                    nodes = data.nodes || [];
                    links = data.links || [];
                    globalOpacityValue = data.globalOpacityValue !== undefined ? data.globalOpacityValue : 0.70;
                }
            } catch (e) {}
        }

        // Real-time updates pinpointing only the center stop configuration node directly inside the DOM defs
        function updateCanvasOpacity(value) {
            globalOpacityValue = parseFloat(value) / 100;
            document.getElementById('opacity-slider-readout').innerText = value + '%';
            
            const chartContainer = document.getElementById('sankey-chart');
            const targetSvg = chartContainer.querySelector('svg.main-svg');
            if (!targetSvg) return;

            // Target only the middle stop element (index 1) for fluid transparency controls
            const grads = targetSvg.querySelectorAll('defs linearGradient');
            grads.forEach(grad => {
                const stops = grad.querySelectorAll('stop');
                if (stops.length === 3) {
                    stops[1].setAttribute('stop-opacity', globalOpacityValue);
                }
            });
            saveToLocalStorage();
        }

        function renderNodes() {
            const container = document.getElementById('nodes-list');
            const badge = document.getElementById('node-count-badge');
            container.innerHTML = '';
            badge.innerText = nodes.length;

            if (nodes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50 text-slate-400">
                        <i class="fa-solid fa-bezier-curve text-xl mb-2 text-slate-300"></i>
                        <p class="text-xs">No elements configured</p>
                    </div>`;
                return;
            }

            nodes.forEach((node, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-2.5 p-2 bg-white border border-slate-200 rounded-xl shadow-sm transition-all hover:border-slate-300`;
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <input type="text" value="${node.name}" class="w-full bg-transparent border-0 focus:ring-1 focus:ring-slate-400 rounded-md font-medium text-slate-800 text-xs px-2 py-1"
                               onchange="updateNodeName(${index}, this.value)">
                    </div>
                    <div class="relative w-7 h-7 rounded-md border border-slate-200 overflow-hidden flex-shrink-0 shadow-inner">
                        <input type="color" value="${node.color || '#94a3b8'}" class="absolute scale-[2] top-[-50%] left-[-50%] w-[200%] h-[200%] cursor-pointer border-0"
                               onchange="updateNodeColor(${index}, this.value)">
                    </div>
                    <button onclick="deleteNode(${index})" class="text-slate-400 hover:text-rose-600 p-1.5 transition-colors flex-shrink-0">
                        <i class="fa-solid fa-circle-xmark text-sm"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            updateFlowSelects();
        }

        function addNode() {
            const name = prompt("Enter Node Name:", `Node ${nodes.length + 1}`);
            if (!name || !name.trim()) return;
            const defaultColors = ['#2e3d52', '#3b82f6', '#10b981', '#a855f7', '#f43f5e', '#f59e0b', '#06b6d4', '#64748b'];
            const chosenColor = defaultColors[nodes.length % defaultColors.length];
            nodes.push({ name: name.trim(), color: chosenColor });
            renderNodes();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateNodeName(index, newName) {
            if (!newName.trim()) return;
            const oldName = nodes[index].name;
            nodes[index].name = newName.trim();
            links.forEach(l => {
                if (l.source === oldName) l.source = nodes[index].name;
                if (l.target === oldName) l.target = nodes[index].name;
            });
            saveToLocalStorage();
            updateFlowSelects();
            generateDiagram();
        }

        function updateNodeColor(index, newColor) {
            nodes[index].color = newColor;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteNode(index) {
            const name = nodes[index].name;
            nodes.splice(index, 1);
            links = links.filter(l => l.source !== name && l.target !== name);
            renderNodes();
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function renderFlowsTable() {
            const tbody = document.getElementById('flows-table-body');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-2 py-8 text-center text-slate-400 bg-slate-50/30">No connections mapped</td></tr>`;
                return;
            }

            links.forEach((link, index) => {
                const row = document.createElement('tr');
                row.className = 'interactive-row';
                row.innerHTML = `
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'source', this.value)">
                            ${createNodeOptions(link.source)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'target', this.value)">
                            ${createNodeOptions(link.target)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <input type="number" value="${link.value}" step="any" min="0" class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs font-mono font-semibold bg-white text-slate-800"
                               onchange="updateLink(${index}, 'value', parseFloat(this.value) || 0)">
                    </td>
                    <td class="px-1 py-1.5 text-center">
                        <button onclick="deleteLink(${index})" class="text-slate-300 hover:text-rose-500 p-1 transition-colors">
                            <i class="fa-solid fa-circle-minus text-sm"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function createNodeOptions(selected) {
            let html = `<option value="">— Select —</option>`;
            nodes.forEach(n => {
                html += `<option value="${n.name}" ${n.name === selected ? 'selected' : ''}>${n.name}</option>`;
            });
            return html;
        }

        function updateFlowSelects() { renderFlowsTable(); }

        function addFlowRow() {
            if (nodes.length < 2) { alert("Configure a minimum of two nodes first."); return; }
            links.push({ source: nodes[0].name, target: nodes[1].name, value: 100 });
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateLink(index, field, value) {
            links[index][field] = value;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteLink(index) {
            links.splice(index, 1);
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function generateDiagram() {
            const container = document.getElementById('sankey-chart');

            if (!nodes.length || !links.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-16 px-4 text-center">
                        <i class="fa-solid fa-cubes-stacked text-3xl mb-2 text-slate-200"></i>
                        <p class="text-xs font-medium">Awaiting Data Mappings</p>
                    </div>`;
                return;
            }

            const nodeNames = nodes.map(n => n.name);
            const nodeColors = nodes.map(n => n.color || '#94a3b8');
            const nodeIndex = {};
            nodeNames.forEach((name, i) => nodeIndex[name] = i);

            const sankeyLinks = { source: [], target: [], value: [], color: [] };
            const cachedGradients = [];

            links.forEach(link => {
                const sIdx = nodeIndex[link.source];
                const tIdx = nodeIndex[link.target];
                if (sIdx !== undefined && tIdx !== undefined && link.value > 0) {
                    const sourceColor = nodes[sIdx].color || '#94a3b8';
                    const targetColor = nodes[tIdx].color || '#94a3b8';
                    
                    sankeyLinks.source.push(sIdx);
                    sankeyLinks.target.push(tIdx);
                    sankeyLinks.value.push(link.value);
                    
                    sankeyLinks.color.push('rgba(200,200,200,0.1)'); 
                    cachedGradients.push({ sourceColor, targetColor });
                }
            });

            const data = [{
                type: "sankey",
                orientation: "h",
                arrangement: "snap",
                node: {
                    pad: 24,
                    thickness: 16,
                    line: { width: 0 }, // Outlines removed cleanly from node blocks
                    label: nodeNames,
                    color: nodeColors,
                    hovertemplate: '<b>%{label}</b><br>Throughput: <b>%{value}</b><extra></extra>'
                },
                link: {
                    source: sankeyLinks.source,
                    target: sankeyLinks.target,
                    value: sankeyLinks.value,
                    color: sankeyLinks.color,
                    hovertemplate: '%{source.label} → %{target.label}<br>Volume: <b>%{value}</b><extra></extra>'
                }
            }];

            const layout = {
                font: { size: 11, color: '#334155', family: 'Inter, system-ui, sans-serif' },
                margin: { t: 10, r: 10, b: 10, l: 10 },
                height: 500,
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent'
            };

            Plotly.react('sankey-chart', data, layout, { responsive: true, displayModeBar: false }).then(() => {
                applyLocalGradients(cachedGradients);
            });
            chartDiv = document.getElementById('sankey-chart');
        }

        function applyLocalGradients(cachedGradients) {
            const chartContainer = document.getElementById('sankey-chart');
            const targetSvg = chartContainer.querySelector('svg.main-svg');
            if (!targetSvg) return;

            let localDefs = targetSvg.querySelector('defs');
            if (!localDefs) {
                localDefs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                targetSvg.insertBefore(localDefs, targetSvg.firstChild);
            }

            const targetPaths = chartContainer.querySelectorAll('.sankey-link');
            
            targetPaths.forEach((path, idx) => {
                if (!cachedGradients[idx]) return;
                
                const { sourceColor, targetColor } = cachedGradients[idx];
                const activeGradId = generateUUID();

                const linearGradNode = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                linearGradNode.setAttribute('id', activeGradId);
                linearGradNode.setAttribute('x1', '0%');
                linearGradNode.setAttribute('y1', '0%');
                linearGradNode.setAttribute('x2', '100%');
                linearGradNode.setAttribute('y2', '0%');

                // Stop 1: Solid anchor matching source color block boundary
                const stopStart = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stopStart.setAttribute('offset', '0%');
                stopStart.setAttribute('stop-color', sourceColor);
                stopStart.setAttribute('stop-opacity', '1.0');

                // Stop 2: Dynamic visibility valley controlled by the range workspace slider
                const stopMiddle = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stopMiddle.setAttribute('offset', '50%');
                // Blends color cleanly across the midpoint trajectory
                stopMiddle.setAttribute('stop-color', sourceColor); 
                stopMiddle.setAttribute('stop-opacity', globalOpacityValue);

                // Stop 3: Solid anchor matching destination target color boundary
                const stopEnd = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stopEnd.setAttribute('offset', '100%');
                stopEnd.setAttribute('stop-color', targetColor);
                stopEnd.setAttribute('stop-opacity', '1.0');

                linearGradNode.appendChild(stopStart);
                linearGradNode.appendChild(stopMiddle);
                linearGradNode.appendChild(stopEnd);
                localDefs.appendChild(linearGradNode);

                path.style.fill = `url(#${activeGradId})`;
                path.style.stroke = 'none';
            });
        }

        function exportJSON() {
            const data = { version: 1, nodes, links };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importJSON() { document.getElementById('json-file-input').click(); }

        document.getElementById('json-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.nodes || !data.links) throw new Error("Missing arrays");
                    nodes = data.nodes; links = data.links;
                    renderNodes(); renderFlowsTable(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Parsing Error: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        function exportSVG() {
            if (!chartDiv) return alert("Render diagram first.");
            Plotly.downloadImage(chartDiv, { format: 'svg', filename: 'sankey_transparent_vector' });
        }

        function exportPNG() {
            if (!chartDiv) return alert("Render diagram first.");
            Plotly.toImage(chartDiv, { format: 'png', width: 2400, height: 1500, scale: 3 }).then(url => {
                const a = document.createElement('a');
                a.href = url; a.download = 'sankey_transparent_high_res.png';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            });
        }

        function resetAll() {
            if (!confirm("Reset chart structure workspace?")) return;
            nodes = []; links = []; 
            localStorage.removeItem('sankeyWorkspaceData_v9');
            renderNodes(); renderFlowsTable();
            document.getElementById('sankey-chart').innerHTML = '';
        }

        function loadDefaultExample() {
            nodes = [
                { name: "Coal", color: "#334155" },
                { name: "Oil", color: "#1e293b" },
                { name: "Natural Gas", color: "#475569" },
                { name: "Renewables", color: "#10b981" },
                { name: "Nuclear", color: "#a855f7" },
                { name: "Electricity", color: "#2563eb" },
                { name: "Industry", color: "#f59e0b" },
                { name: "Transport", color: "#ef4444" },
                { name: "Buildings", color: "#6366f1" }
            ];

            links = [
                { source: "Coal", target: "Electricity", value: 920 },
                { source: "Coal", target: "Industry", value: 680 },
                { source: "Oil", target: "Transport", value: 1950 },
                { source: "Oil", target: "Industry", value: 420 },
                { source: "Natural Gas", target: "Electricity", value: 780 },
                { source: "Natural Gas", target: "Industry", value: 510 },
                { source: "Renewables", target: "Electricity", value: 1450 },
                { source: "Nuclear", target: "Electricity", value: 620 },
                { source: "Electricity", target: "Industry", value: 980 },
                { source: "Electricity", target: "Buildings", value: 720 },
                { source: "Electricity", target: "Transport", value: 310 },
                { source: "Renewables", target: "Buildings", value: 290 }
            ];

            renderNodes();
            renderFlowsTable();
            generateDiagram();
        }

        window.onload = function() {
            loadFromLocalStorage();
            
            const slider = document.getElementById('global-opacity-slider');
            slider.value = Math.round(globalOpacityValue * 100);
            document.getElementById('opacity-slider-readout').innerText = slider.value + '%';
            
            if (nodes.length === 0) {
                loadDefaultExample();
            } else {
                renderNodes();
                renderFlowsTable();
                generateDiagram();
            }
        };
    </script>
</body>
</html>
