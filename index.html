<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Me Sankey!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.025em; }

        .section-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.05), 0 4px 6px -4px rgb(15 23 42 / 0.05);
            border: 1px solid #e2e8f0;
        }

        .sankey-container {
            background: #f8fafc;
            border-radius: 16px;
            box-shadow: inset 0 2px 4px 0 rgb(15 23 42 / 0.03);
        }

        .modern-table { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .flow-row { transition: background-color 0.1s ease; }
        .flow-row:hover { background-color: #f8fafc; }
        .node-item { transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1); }
        .node-item:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.1); }
    </style>
</head>
<body class="bg-slate-100">
    <div class="max-w-[1280px] mx-auto px-4 py-6 sm:px-6">
        
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-4xl sm:text-5xl font-semibold title-font text-slate-900 tracking-tighter">Make Me Sankey!</h1>
                <p class="text-slate-600 mt-1 text-lg">Beautiful, high-resolution Sankey diagrams — instantly</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <div class="flex bg-white rounded-2xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importJSON()" class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 rounded-xl transition-all">
                        <i class="fa-solid fa-upload"></i>
                        <span class="hidden sm:inline">Import</span>
                    </button>
                    <button onclick="exportJSON()" class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 rounded-xl transition-all">
                        <i class="fa-solid fa-download"></i>
                        <span class="hidden sm:inline">Export JSON</span>
                    </button>
                </div>

                <div class="flex bg-white rounded-2xl shadow-sm border border-slate-200 p-1">
                    <button onclick="generateDiagram()" class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white text-sm font-semibold rounded-xl transition-all shadow-sm">
                        <i class="fa-solid fa-sync-alt"></i>
                        <span>Generate</span>
                    </button>
                    <button onclick="exportSVG()" class="flex items-center gap-2 px-3.5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 rounded-xl transition-all">
                        <i class="fa-solid fa-file-export"></i>
                    </button>
                    <button onclick="exportPNG()" class="flex items-center gap-2 px-3.5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 active:bg-slate-100 rounded-xl transition-all">
                        <i class="fa-solid fa-image"></i>
                    </button>
                </div>

                <button onclick="resetAll()" class="px-4 py-2.5 text-sm font-medium text-red-600 hover:bg-red-50 active:bg-red-100 rounded-2xl border border-red-200 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-undo"></i>
                    <span class="hidden sm:inline">Reset</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Nodes -->
            <div class="lg:col-span-3 section-card p-5">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="font-semibold text-xl text-slate-800">Nodes</h2>
                        <p class="text-xs text-slate-500 mt-0.5">Max 10 • Tap to edit</p>
                    </div>
                    <button onclick="addNode()" class="flex items-center justify-center w-9 h-9 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white rounded-2xl transition-all shadow-sm">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="nodes-list" class="space-y-2 max-h-[380px] overflow-auto pr-1"></div>
            </div>

            <!-- Flows -->
            <div class="lg:col-span-5 section-card p-5 flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="font-semibold text-xl text-slate-800">Flows</h2>
                        <p class="text-xs text-slate-500">Up to ~20 per node</p>
                    </div>
                    <button onclick="addFlowRow()" class="flex items-center gap-2 px-4 py-2 bg-slate-900 hover:bg-black active:bg-slate-950 text-white text-sm font-semibold rounded-2xl transition-all">
                        <i class="fa-solid fa-plus text-xs"></i>
                        <span class="hidden sm:inline">Add Flow</span>
                    </button>
                </div>
                
                <div class="flex-1 overflow-auto modern-table">
                    <table class="w-full text-sm min-w-[520px]">
                        <thead class="bg-slate-50 sticky top-0 z-10">
                            <tr>
                                <th class="px-4 py-3 text-left font-semibold text-slate-600">Source</th>
                                <th class="px-4 py-3 text-left font-semibold text-slate-600">Target</th>
                                <th class="px-4 py-3 text-left font-semibold text-slate-600 w-24">Value</th>
                                <th class="w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="flows-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <!-- Sankey -->
            <div class="lg:col-span-4 section-card p-5 flex flex-col">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-semibold text-xl text-slate-800">Sankey Diagram</h2>
                    <button onclick="generateDiagram()" class="text-xs px-3 py-1.5 bg-emerald-100 hover:bg-emerald-200 active:bg-emerald-300 text-emerald-700 rounded-xl font-medium flex items-center gap-1.5 transition-colors">
                        <i class="fa-solid fa-sync-alt text-xs"></i>
                        <span>Refresh</span>
                    </button>
                </div>
                
                <div class="sankey-container flex-1 p-3 rounded-2xl border border-slate-100">
                    <div id="sankey-chart" class="w-full h-full min-h-[420px]"></div>
                </div>
                <div class="mt-3 text-center">
                    <p class="text-xs text-slate-500">Flows blend from source → destination colour (semi-transparent)</p>
                </div>
            </div>
            
        </div>
    </div>

    <input type="file" id="json-file-input" accept=".json" class="hidden">

    <script>
        let nodes = [];
        let links = [];
        let chartDiv = null;

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 116, b: 139 };
        }

        function blendColors(hex1, hex2, alpha = 0.42) {
            const rgb1 = hexToRgb(hex1);
            const rgb2 = hexToRgb(hex2);
            const r = Math.round((rgb1.r + rgb2.r) / 2);
            const g = Math.round((rgb1.g + rgb2.g) / 2);
            const b = Math.round((rgb1.b + rgb2.b) / 2);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function saveToLocalStorage() {
            try { localStorage.setItem('sankeyData', JSON.stringify({ nodes, links })); } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('sankeyData');
                if (saved) {
                    const data = JSON.parse(saved);
                    nodes = data.nodes || [];
                    links = data.links || [];
                }
            } catch (e) {}
        }

        function renderNodes() {
            const container = document.getElementById('nodes-list');
            container.innerHTML = '';

            if (nodes.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400"><i class="fa-solid fa-info-circle text-2xl mb-2 block"></i> Add your first node</div>`;
                return;
            }

            nodes.forEach((node, index) => {
                const div = document.createElement('div');
                div.className = `node-item flex items-center gap-3 p-3.5 bg-white border border-slate-200 rounded-2xl`;
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <input type="text" value="${node.name}" class="w-full bg-transparent border-0 focus:ring-0 font-semibold text-slate-800 text-[15px] p-0"
                               onchange="updateNodeName(${index}, this.value)">
                    </div>
                    <input type="color" value="${node.color || '#64748b'}" class="w-9 h-9 p-1 border border-slate-300 rounded-2xl cursor-pointer flex-shrink-0"
                           onchange="updateNodeColor(${index}, this.value)">
                    <button onclick="deleteNode(${index})" class="text-red-400 hover:text-red-600 active:text-red-700 p-2 transition-colors flex-shrink-0">
                        <i class="fa-solid fa-trash text-base"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            updateFlowSelects();
        }

        function addNode() {
            if (nodes.length >= 10) { alert("Maximum 10 nodes reached."); return; }
            const name = prompt("Node name:", `Node ${nodes.length + 1}`);
            if (!name || !name.trim()) return;
            nodes.push({ name: name.trim(), color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0') });
            renderNodes();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateNodeName(index, newName) {
            if (!newName.trim()) return;
            nodes[index].name = newName.trim();
            saveToLocalStorage();
            updateFlowSelects();
            generateDiagram();
        }

        function updateNodeColor(index, newColor) {
            nodes[index].color = newColor;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteNode(index) {
            if (!confirm(`Delete "${nodes[index].name}"?`)) return;
            const name = nodes[index].name;
            nodes.splice(index, 1);
            links = links.filter(l => l.source !== name && l.target !== name);
            renderNodes();
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function renderFlowsTable() {
            const tbody = document.getElementById('flows-table-body');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-10 text-center text-slate-400"><i class="fa-solid fa-link text-xl mb-2 block"></i>No flows yet</td></tr>`;
                return;
            }

            links.forEach((link, index) => {
                const row = document.createElement('tr');
                row.className = 'flow-row';
                row.innerHTML = `
                    <td class="px-3 py-2.5">
                        <select class="w-full border border-slate-300 focus:border-emerald-400 rounded-xl px-3 py-2 text-sm bg-white" onchange="updateLink(${index}, 'source', this.value)">
                            ${createNodeOptions(link.source)}
                        </select>
                    </td>
                    <td class="px-3 py-2.5">
                        <select class="w-full border border-slate-300 focus:border-emerald-400 rounded-xl px-3 py-2 text-sm bg-white" onchange="updateLink(${index}, 'target', this.value)">
                            ${createNodeOptions(link.target)}
                        </select>
                    </td>
                    <td class="px-3 py-2.5">
                        <input type="number" value="${link.value}" step="any" min="0" class="w-full border border-slate-300 focus:border-emerald-400 rounded-xl px-3 py-2 text-sm bg-white"
                               onchange="updateLink(${index}, 'value', parseFloat(this.value) || 0)">
                    </td>
                    <td class="px-2 py-2.5 text-center">
                        <button onclick="deleteLink(${index})" class="text-red-400 hover:text-red-600 active:text-red-700 p-2 transition-colors">
                            <i class="fa-solid fa-times text-lg"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function createNodeOptions(selected) {
            let html = `<option value="">—</option>`;
            nodes.forEach(n => {
                html += `<option value="${n.name}" ${n.name === selected ? 'selected' : ''}>${n.name}</option>`;
            });
            return html;
        }

        function updateFlowSelects() { renderFlowsTable(); }

        function addFlowRow() {
            if (nodes.length < 2) { alert("Add at least two nodes first."); return; }
            links.push({ source: nodes[0].name, target: nodes[1].name, value: 100 });
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateLink(index, field, value) {
            links[index][field] = value;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteLink(index) {
            links.splice(index, 1);
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        // === CORRECTED: Source + Target colour blending with semi-transparency ===
        function generateDiagram() {
            const container = document.getElementById('sankey-chart');

            if (!nodes.length || !links.length) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 py-12"><i class="fa-solid fa-chart-area text-5xl mb-4 opacity-40"></i><p class="text-sm">Add nodes and flows to generate your diagram</p></div>`;
                return;
            }

            const nodeNames = nodes.map(n => n.name);
            const nodeColors = nodes.map(n => n.color || '#64748b');
            const nodeIndex = {};
            nodeNames.forEach((name, i) => nodeIndex[name] = i);

            const sankeyLinks = { source: [], target: [], value: [], color: [] };

            links.forEach(link => {
                const sIdx = nodeIndex[link.source];
                const tIdx = nodeIndex[link.target];
                if (sIdx !== undefined && tIdx !== undefined && link.value > 0) {
                    const sourceColor = nodes[sIdx].color || '#64748b';
                    const targetColor = nodes[tIdx].color || '#64748b';
                    
                    // Blend using START node colour + END node colour + semi-transparency
                    sankeyLinks.source.push(sIdx);
                    sankeyLinks.target.push(tIdx);
                    sankeyLinks.value.push(link.value);
                    sankeyLinks.color.push(blendColors(sourceColor, targetColor, 0.42));
                }
            });

            const data = [{
                type: "sankey",
                orientation: "h",
                arrangement: "snap",
                node: {
                    pad: 22,
                    thickness: 26,
                    line: { color: "#e2e8f0", width: 1.5 },
                    label: nodeNames,
                    color: nodeColors,
                    hovertemplate: '<b>%{label}</b><extra></extra>'
                },
                link: {
                    source: sankeyLinks.source,
                    target: sankeyLinks.target,
                    value: sankeyLinks.value,
                    color: sankeyLinks.color,
                    hovertemplate: '%{source.label} → %{target.label}<br><b>%{value}</b><extra></extra>'
                }
            }];

            const layout = {
                font: { size: 14, color: '#334155', family: 'Inter, system-ui' },
                margin: { t: 10, r: 10, b: 10, l: 10 },
                height: 520,
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent'
            };

            Plotly.react('sankey-chart', data, layout, { responsive: true, displayModeBar: false });
            chartDiv = document.getElementById('sankey-chart');
        }

        // Export functions
        function exportJSON() {
            const data = { version: 1, nodes, links };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importJSON() { document.getElementById('json-file-input').click(); }

        document.getElementById('json-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.nodes || !data.links) throw new Error("Invalid format");
                    nodes = data.nodes; links = data.links;
                    renderNodes(); renderFlowsTable(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Invalid JSON: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        function exportSVG() {
            if (!chartDiv) return alert("Generate the diagram first.");
            Plotly.downloadImage(chartDiv, { format: 'svg', filename: 'sankey_diagram' });
        }

        function exportPNG() {
            if (!chartDiv) return alert("Generate the diagram first.");
            Plotly.toImage(chartDiv, { format: 'png', width: 1600, height: 1000, scale: 3 }).then(url => {
                const a = document.createElement('a');
                a.href = url; a.download = 'sankey_high_res.png';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            });
        }

        function resetAll() {
            if (!confirm("Reset all data?")) return;
            nodes = []; links = []; localStorage.removeItem('sankeyData');
            renderNodes(); renderFlowsTable();
            document.getElementById('sankey-chart').innerHTML = '';
        }

        function loadDefaultExample() {
            nodes = [
                { name: "Coal", color: "#1e2937" },
                { name: "Natural Gas", color: "#475569" },
                { name: "Oil", color: "#334155" },
                { name: "Renewables", color: "#22c55e" },
                { name: "Nuclear", color: "#a855f7" },
                { name: "Electricity", color: "#3b82f6" },
                { name: "Industry", color: "#f59e0b" },
                { name: "Transport", color: "#ef4444" },
                { name: "Buildings", color: "#8b5cf6" }
            ];

            links = [
                { source: "Coal", target: "Electricity", value: 920 },
                { source: "Coal", target: "Industry", value: 680 },
                { source: "Natural Gas", target: "Electricity", value: 780 },
                { source: "Natural Gas", target: "Industry", value: 510 },
                { source: "Oil", target: "Electricity", value: 650 },
                { source: "Oil", target: "Transport", value: 1950 },
                { source: "Renewables", target: "Electricity", value: 1450 },
                { source: "Nuclear", target: "Electricity", value: 620 },
                { source: "Electricity", target: "Industry", value: 980 },
                { source: "Electricity", target: "Buildings", value: 720 },
                { source: "Electricity", target: "Transport", value: 310 },
                { source: "Renewables", target: "Buildings", value: 290 }
            ];

            renderNodes();
            renderFlowsTable();
            generateDiagram();
        }

        function initializeApp() {
            loadFromLocalStorage();
            if (nodes.length === 0) {
                loadDefaultExample();
            } else {
                renderNodes();
                renderFlowsTable();
                generateDiagram();
            }
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
