<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Me Sankey!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }
        
        .interactive-row { transition: all 0.15s ease; }
        .interactive-row:hover { background-color: #f8fafc; }

        /* Master Presentation Layer Class Overrides */
        .sankey-link {
            fill-opacity: 0.82 !important;
            stroke-opacity: 0.0 !important;
            transition: fill-opacity 0.2s ease, filter 0.2s ease;
        }
        .sankey-link:hover {
            fill-opacity: 0.96 !important;
            filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.14)) !important;
        }
        .sankey-link.is-dimmed {
            fill-opacity: 0.10 !important;
        }

        .sankey-node-rect {
            transition: filter 0.2s ease;
        }
        .sankey-node-rect:hover {
            filter: drop-shadow(0 6px 14px rgba(15, 23, 42, 0.20));
        }

        .sankey-leader {
            stroke: #cbd5e1;
            stroke-width: 1px;
        }
        .sankey-label-text {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 600;
            font-size: 13px;
            fill: #0f172a;
            letter-spacing: -0.01em;
        }
        .sankey-label-value {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            fill: #94a3b8;
        }

        @media (prefers-reduced-motion: reduce) {
            .sankey-link, .sankey-node-rect { transition: none !important; }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen">

    <div class="max-w-[1600px] mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 pb-6 border-b border-slate-200">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-sm">
                        <i class="fa-solid fa-diagram-project text-base"></i>
                    </div>
                    <h1 class="text-3xl font-bold title-font text-slate-900 tracking-tight">Make Me Sankey!</h1>
                </div>
                <p class="text-slate-500 mt-1.5 text-sm">Design crisp, high-resolution flow models instantly onto clean transparent layers.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importJSON()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all" title="Import Model Structure Data File">
                        <i class="fa-solid fa-file-import text-slate-400"></i>
                        <span>Import Model</span>
                    </button>
                    <button onclick="exportJSON()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all" title="Export Model Structure Data File">
                        <i class="fa-solid fa-file-code text-slate-400"></i>
                        <span>Export Model</span>
                    </button>
                </div>

                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importBranding()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="Load Custom Corporate Color Profiles">
                        <i class="fa-solid fa-palette"></i>
                        <span>Load Branding</span>
                    </button>
                    <button onclick="exportBranding()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="Save Current Color Space Schemes">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span>Save Branding</span>
                    </button>
                </div>

                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="generateDiagram()" class="flex items-center gap-1.5 px-3.5 py-2 bg-slate-900 hover:bg-black text-white text-xs font-semibold rounded-lg transition-all shadow-sm">
                        <i class="fa-solid fa-rotate"></i>
                        <span>Render Layout</span>
                    </button>
                    <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                    <button onclick="exportSVG()" class="p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all" title="Export Vector SVG">
                        <i class="fa-solid fa-vector-square"></i>
                    </button>
                    <button onclick="exportPNG()" class="p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all" title="Export Ultra-High-Res PNG">
                        <i class="fa-solid fa-image"></i>
                    </button>
                </div>

                <button onclick="resetAll()" class="px-3.5 py-2 text-xs font-medium text-rose-600 hover:bg-rose-50 rounded-xl border border-rose-200 transition-all flex items-center gap-1.5">
                    <i class="fa-solid fa-trash-can text-xs"></i>
                    <span>Clear</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-3 glass-card p-5 shadow-sm bg-white">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight flex items-center gap-2">
                            <span>Nodes</span>
                            <span id="node-count-badge" class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-mono font-medium">0</span>
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Label structural targets</p>
                    </div>
                    <button onclick="addNode()" class="w-8 h-8 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-lg transition-all flex items-center justify-center border border-slate-200">
                        <i class="fa-solid fa-plus text-sm"></i>
                    </button>
                </div>
                <div id="nodes-list" class="space-y-2.5 max-h-[580px] overflow-y-auto pr-1"></div>
            </div>

            <div class="lg:col-span-4 glass-card p-5 shadow-sm bg-white flex flex-col">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Flow Mapping</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Link mapping intersections</p>
                    </div>
                    <button onclick="addFlowRow()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-xs font-medium rounded-lg transition-all">
                        <i class="fa-solid fa-circle-plus text-xs"></i>
                        <span>Add Flow</span>
                    </button>
                </div>
                
                <div class="flex-1 overflow-x-auto border border-slate-200 rounded-xl bg-white">
                    <table class="w-full text-xs min-w-[360px]">
                        <thead class="bg-slate-50 text-slate-500 font-semibold uppercase tracking-wider border-b border-slate-200 sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-2.5 text-left font-medium">Source</th>
                                <th class="px-3 py-2.5 text-left font-medium">Target</th>
                                <th class="px-3 py-2.5 text-left font-medium w-24">Value</th>
                                <th class="w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="flows-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-5 glass-card p-5 shadow-sm flex flex-col min-h-[540px]">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Sankey Output Canvas</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Crisp gradient flows, ready to present</p>
                    </div>
                    
                    <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 shadow-inner">
                        <span class="text-xs font-semibold text-slate-500">Flow Fade:</span>
                        <input type="range" id="global-opacity-slider" min="0" max="100" value="40" 
                               class="w-24 accent-slate-900 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                               oninput="updateCanvasOpacity(this.value)">
                        <span id="opacity-slider-readout" class="text-xs font-mono font-bold text-slate-700 min-w-[34px] text-right">40%</span>
                    </div>
                </div>
                
                <div class="flex-1 bg-transparent p-2 rounded-xl border border-dashed border-slate-200 flex items-center justify-center min-h-[460px] relative">
                    <div id="sankey-chart" class="w-full h-full"></div>
                    
                    <button onclick="resetCanvasPosition()" class="absolute bottom-4 right-4 z-20 px-3 py-1.5 bg-white/90 hover:bg-white text-slate-700 hover:text-slate-900 border border-slate-200 rounded-xl shadow-sm text-xs font-medium flex items-center gap-1.5 transition-all">
                        <i class="fa-solid fa-compress"></i>
                        <span>Reset Position</span>
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <input type="file" id="json-file-input" accept=".json" class="hidden">
    <input type="file" id="branding-file-input" accept=".json" class="hidden">

    <script>
        let nodes = [];
        let links = [];
        let chartDiv = null;
        let globalOpacityValue = 0.40; 
        let dragObserver = null;
        let activeGradientsCache = [];

        function saveToLocalStorage() {
            try { localStorage.setItem('sankeyWorkspaceData_v13', JSON.stringify({ nodes, links, globalOpacityValue })); } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('sankeyWorkspaceData_v13');
                if (saved) {
                    const data = JSON.parse(saved);
                    nodes = data.nodes || [];
                    links = data.links || [];
                    globalOpacityValue = data.globalOpacityValue !== undefined ? data.globalOpacityValue : 0.40;
                }
            } catch (e) {}
        }

        function updateCanvasOpacity(value) {
            globalOpacityValue = parseFloat(value) / 100;
            document.getElementById('opacity-slider-readout').innerText = value + '%';
            applyLocalGradients();
            saveToLocalStorage();
        }

        function resetCanvasPosition() {
            if (!chartDiv) return;
            Plotly.relayout(chartDiv, {
                'node.x': null,
                'node.y': null
            }).then(() => {
                stripNativeLabels();
                applyLocalGradients();
                drawValueLabels();
                attachLinkHighlighting();
            });
        }

        function renderNodes() {
            const container = document.getElementById('nodes-list');
            const badge = document.getElementById('node-count-badge');
            container.innerHTML = '';
            badge.innerText = nodes.length;

            if (nodes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50 text-slate-400">
                        <i class="fa-solid fa-bezier-curve text-xl mb-2 text-slate-300"></i>
                        <p class="text-xs">No elements configured</p>
                    </div>`;
                return;
            }

            nodes.forEach((node, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-2.5 p-2 bg-white border border-slate-200 rounded-xl shadow-sm transition-all hover:border-slate-300`;
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <input type="text" value="${node.name}" class="w-full bg-transparent border-0 focus:ring-1 focus:ring-slate-400 rounded-md font-medium text-slate-800 text-xs px-2 py-1"
                               onchange="updateNodeName(${index}, this.value)">
                    </div>
                    <div class="relative w-7 h-7 rounded-md border border-slate-200 overflow-hidden flex-shrink-0 shadow-inner">
                        <input type="color" value="${node.color || '#94a3b8'}" class="absolute scale-[2] top-[-50%] left-[-50%] w-[200%] h-[200%] cursor-pointer border-0"
                               onchange="updateNodeColor(${index}, this.value)">
                    </div>
                    <button onclick="deleteNode(${index})" class="text-slate-400 hover:text-rose-600 p-1.5 transition-colors flex-shrink-0">
                        <i class="fa-solid fa-circle-xmark text-sm"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            updateFlowSelects();
        }

        function addNode() {
            const name = prompt("Enter Node Name:", `Node ${nodes.length + 1}`);
            if (!name || !name.trim()) return;
            const premiumPalette = ['#1e293b', '#2563eb', '#10b981', '#7c3aed', '#f43f5e', '#d97706', '#0891b2', '#475569'];
            const chosenColor = premiumPalette[nodes.length % premiumPalette.length] || '#475569';
            nodes.push({ name: name.trim(), color: chosenColor });
            renderNodes();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateNodeName(index, newName) {
            if (!newName.trim()) return;
            const oldName = nodes[index].name;
            nodes[index].name = newName.trim();
            links.forEach(l => {
                if (l.source === oldName) l.source = nodes[index].name;
                if (l.target === oldName) l.target = nodes[index].name;
            });
            saveToLocalStorage();
            updateFlowSelects();
            generateDiagram();
        }

        function updateNodeColor(index, newColor) {
            nodes[index].color = newColor;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteNode(index) {
            const name = nodes[index].name;
            nodes.splice(index, 1);
            links = links.filter(l => l.source !== name && l.target !== name);
            renderNodes();
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function renderFlowsTable() {
            const tbody = document.getElementById('flows-table-body');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-2 py-8 text-center text-slate-400 bg-slate-50/30">No connections mapped</td></tr>`;
                return;
            }

            links.forEach((link, index) => {
                const row = document.createElement('tr');
                row.className = 'interactive-row';
                row.innerHTML = `
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'source', this.value)">
                            ${createNodeOptions(link.source)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'target', this.value)">
                            ${createNodeOptions(link.target)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <input type="number" value="${link.value}" step="any" min="0" class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs font-mono font-semibold bg-white text-slate-800"
                               onchange="updateLink(${index}, 'value', parseFloat(this.value) || 0)">
                    </td>
                    <td class="px-1 py-1.5 text-center">
                        <button onclick="deleteLink(${index})" class="text-slate-300 hover:text-rose-500 p-1 transition-colors">
                            <i class="fa-solid fa-circle-minus text-sm"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function createNodeOptions(selected) {
            let html = `<option value="">— Select —</option>`;
            nodes.forEach(n => {
                html += `<option value="${n.name}" ${n.name === selected ? 'selected' : ''}>${n.name}</option>`;
            });
            return html;
        }

        function updateFlowSelects() { renderFlowsTable(); }

        function addFlowRow() {
            if (nodes.length < 2) { alert("Configure a minimum of two nodes first."); return; }
            links.push({ source: nodes[0].name, target: nodes[1].name, value: 100 });
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateLink(index, field, value) {
            links[index][field] = value;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteLink(index) {
            links.splice(index, 1);
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        // Measures text width using an offscreen canvas so we can size layout margins
        // BEFORE Plotly renders, instead of discovering labels don't fit after the fact.
        let measureCtx = null;
        function measureTextWidth(text, font) {
            if (!measureCtx) measureCtx = document.createElement('canvas').getContext('2d');
            measureCtx.font = font;
            return measureCtx.measureText(text).width;
        }

        function generateDiagram() {
            const container = document.getElementById('sankey-chart');
            if (dragObserver) dragObserver.disconnect();

            if (!nodes.length || !links.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-16 px-4 text-center">
                        <i class="fa-solid fa-cubes-stacked text-3xl mb-2 text-slate-200"></i>
                        <p class="text-xs font-medium">Awaiting Data Mappings</p>
                    </div>`;
                return;
            }

            const nodeNames = nodes.map(n => n.name);
            const nodeColors = nodes.map(n => n.color || '#94a3b8');
            const nodeIndex = {};
            nodeNames.forEach((name, i) => nodeIndex[name] = i);

            const validLinks = links.filter(l => nodeIndex[l.source] !== undefined && nodeIndex[l.target] !== undefined && l.value > 0);

            const sankeyLinks = { source: [], target: [], value: [], color: [], label: [] };
            activeGradientsCache = [];

            const orderedLinks = [...validLinks].sort((a, b) => b.value - a.value);

            orderedLinks.forEach(link => {
                const sIdx = nodeIndex[link.source];
                const tIdx = nodeIndex[link.target];
                const sourceColor = nodes[sIdx].color || '#94a3b8';
                const targetColor = nodes[tIdx].color || '#94a3b8';

                sankeyLinks.source.push(sIdx);
                sankeyLinks.target.push(tIdx);
                sankeyLinks.value.push(link.value);
                sankeyLinks.color.push('rgba(0,0,0,0.001)');
                sankeyLinks.label.push(formatFlowValue(link.value));
                activeGradientsCache.push({ sourceColor, targetColor, sourceName: link.source, targetName: link.target });
            });

            const nodePad = nodeNames.length <= 6 ? 30 : (nodeNames.length <= 12 ? 22 : 15);
            const nodeThickness = nodeNames.length <= 10 ? 16 : 12;

            // Identify which nodes have no inflow (true sources, sit in the left column)
            // vs no outflow (true sinks, sit in the right column) — used purely to size
            // left/right margins to whichever labels live on each edge.
            const hasInflow = new Set(validLinks.map(l => l.target));
            const hasOutflow = new Set(validLinks.map(l => l.source));
            const leftEdgeNames = nodeNames.filter(n => !hasInflow.has(n));
            const rightEdgeNames = nodeNames.filter(n => !hasOutflow.has(n));

            const labelFont = '600 13px Inter, system-ui, sans-serif';
            const widestLeft = Math.max(0, ...leftEdgeNames.map(n => measureTextWidth(n, labelFont)));
            const widestRight = Math.max(0, ...rightEdgeNames.map(n => measureTextWidth(n, labelFont)));

            // Real margin reserved for floating labels: text width + connector gap + pill padding.
            const leftMargin = Math.ceil(widestLeft + 34);
            const rightMargin = Math.ceil(widestRight + 34);

            const data = [{
                type: "sankey",
                orientation: "h",
                arrangement: "snap",
                node: {
                    pad: nodePad,
                    thickness: nodeThickness,
                    line: { width: 0 },
                    label: nodeNames,
                    color: nodeColors,
                    hoverlabel: { font: { family: 'Inter, system-ui, sans-serif', size: 12 }, bgcolor: '#0f172a', bordercolor: '#0f172a' },
                    hovertemplate: '<b>%{label}</b><br>Total throughput: <b>%{value:,.1f}</b><extra></extra>'
                },
                link: {
                    source: sankeyLinks.source,
                    target: sankeyLinks.target,
                    value: sankeyLinks.value,
                    color: sankeyLinks.color,
                    hoverlabel: { font: { family: 'Inter, system-ui, sans-serif', size: 12 }, bgcolor: '#0f172a', bordercolor: '#0f172a' },
                    hovertemplate: '%{source.label} → %{target.label}<br>Value: <b>%{value:,.1f}</b><extra></extra>'
                }
            }];

            const layout = {
                font: { size: 12, color: '#1e293b', family: 'Inter, system-ui, sans-serif' },
                margin: { t: 28, r: rightMargin, b: 28, l: leftMargin },
                height: Math.max(520, nodeNames.length * 34),
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent'
            };

            Plotly.react('sankey-chart', data, layout, { responsive: true, displayModeBar: false }).then(() => {
                stripNativeLabels();
                applyLocalGradients();
                drawValueLabels();
                attachLinkHighlighting();
                setupDragObserver();
            });
            chartDiv = document.getElementById('sankey-chart');

            renderAccessibleSummary(validLinks);
        }

        function formatFlowValue(v) {
            if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
            return v.toLocaleString(undefined, { maximumFractionDigits: 1 });
        }

        function stripNativeLabels() {
            const chartContainer = document.getElementById('sankey-chart');
            const nativeLabels = chartContainer.querySelectorAll('.sankey .node text');
            nativeLabels.forEach(t => { t.style.display = 'none'; });
        }

        function applyLocalGradients() {
            const chartContainer = document.getElementById('sankey-chart');
            const targetSvg = chartContainer.querySelector('svg.main-svg');
            if (!targetSvg) return;

            let localDefs = targetSvg.querySelector('defs.local-gradient-defs');
            if (!localDefs) {
                localDefs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                localDefs.setAttribute('class', 'local-gradient-defs');
                targetSvg.insertBefore(localDefs, targetSvg.firstChild);
            } else {
                localDefs.innerHTML = '';
            }

            const targetPaths = chartContainer.querySelectorAll('.sankey-link');

            targetPaths.forEach((path, idx) => {
                if (!activeGradientsCache[idx]) return;

                const { sourceColor, targetColor } = activeGradientsCache[idx];
                const activeGradId = `link-grad-${idx}`;

                let bbox;
                try { bbox = path.getBBox(); } catch (e) { bbox = null; }

                const linearGradNode = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                linearGradNode.setAttribute('id', activeGradId);

                if (bbox && bbox.width > 0) {
                    linearGradNode.setAttribute('gradientUnits', 'userSpaceOnUse');
                    linearGradNode.setAttribute('x1', bbox.x);
                    linearGradNode.setAttribute('y1', bbox.y + bbox.height / 2);
                    linearGradNode.setAttribute('x2', bbox.x + bbox.width);
                    linearGradNode.setAttribute('y2', bbox.y + bbox.height / 2);
                } else {
                    linearGradNode.setAttribute('x1', '0%'); linearGradNode.setAttribute('y1', '0%');
                    linearGradNode.setAttribute('x2', '100%'); linearGradNode.setAttribute('y2', '0%');
                }

                // Tighter, earlier color commitment (28%/72% vs the old 42%/58%) so each ribbon
                // reads clearly as "this color near its source, that color near its target"
                // instead of a long muddy gray middle section.
                const stops = [
                    { offset: '0%', color: sourceColor, opacity: '1.0' },
                    { offset: '28%', color: sourceColor, opacity: String(Math.max(globalOpacityValue, 0.55)) },
                    { offset: '72%', color: targetColor, opacity: String(Math.max(globalOpacityValue, 0.55)) },
                    { offset: '100%', color: targetColor, opacity: '1.0' }
                ];
                stops.forEach(s => {
                    const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                    stop.setAttribute('offset', s.offset);
                    stop.setAttribute('stop-color', s.color);
                    stop.setAttribute('stop-opacity', s.opacity);
                    linearGradNode.appendChild(stop);
                });
                localDefs.appendChild(linearGradNode);

                path.style.fill = `url(#${activeGradId})`;
                path.style.stroke = 'none';
                path.dataset.linkIdx = idx;
            });

            chartContainer.querySelectorAll('.sankey .node rect, .sankey .node path').forEach(r => {
                r.classList.add('sankey-node-rect');
            });
        }

        // Floating labels: positioned OUTSIDE the plot area (in the margin space we reserved
        // in generateDiagram), connected to their node with a short leader stroke. This is the
        // classic spacious Sankey label style — labels never sit on top of link paths because
        // they live in dedicated margin space that links can't reach.
        function drawValueLabels() {
            const chartContainer = document.getElementById('sankey-chart');
            const targetSvg = chartContainer.querySelector('svg.main-svg');
            if (!targetSvg) return;

            let labelLayer = targetSvg.querySelector('g.local-label-layer');
            if (labelLayer) labelLayer.remove();
            labelLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            labelLayer.setAttribute('class', 'local-label-layer');
            targetSvg.appendChild(labelLayer);

            const plotWidth = targetSvg.viewBox && targetSvg.viewBox.baseVal && targetSvg.viewBox.baseVal.width
                ? targetSvg.viewBox.baseVal.width
                : targetSvg.getBoundingClientRect().width;

            const nodeEls = chartContainer.querySelectorAll('.sankey .node');
            nodeEls.forEach((nodeEl, i) => {
                const rect = nodeEl.querySelector('rect, path');
                if (!rect) return;
                let bbox;
                try { bbox = rect.getBBox(); } catch (e) { return; }

                const transform = nodeEl.getAttribute('transform') || '';
                const match = /translate\(([-\d.]+),\s*([-\d.]+)\)/.exec(transform);
                const tx = match ? parseFloat(match[1]) : 0;
                const ty = match ? parseFloat(match[2]) : 0;

                const absX = tx + bbox.x;
                const absY = ty + bbox.y;
                const nodeCenterY = absY + bbox.height / 2;
                const isLeftColumn = (absX + bbox.width / 2) < plotWidth / 2;

                const name = nodes[i] ? nodes[i].name : '';
                const inflow = links.filter(l => l.target === name).reduce((sum, l) => sum + l.value, 0);
                const outflow = links.filter(l => l.source === name).reduce((sum, l) => sum + l.value, 0);
                const totalValue = inflow > 0 ? inflow : outflow;

                const labelText = name;
                const valueText = formatFlowValue(totalValue);

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const textAnchor = isLeftColumn ? 'end' : 'start';

                // Leader: short horizontal tick from the node edge out into the margin,
                // then the label sits past it. Reads as deliberate annotation, not a floating tag.
                const leaderLen = 10;
                const nodeEdgeX = isLeftColumn ? absX : absX + bbox.width;
                const leaderEndX = isLeftColumn ? nodeEdgeX - leaderLen : nodeEdgeX + leaderLen;
                const textX = isLeftColumn ? leaderEndX - 6 : leaderEndX + 6;

                const leader = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                leader.setAttribute('x1', nodeEdgeX);
                leader.setAttribute('y1', nodeCenterY);
                leader.setAttribute('x2', leaderEndX);
                leader.setAttribute('y2', nodeCenterY);
                leader.setAttribute('class', 'sankey-leader');
                g.appendChild(leader);

                const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                nameEl.setAttribute('class', 'sankey-label-text');
                nameEl.setAttribute('x', textX);
                nameEl.setAttribute('y', nodeCenterY - 3);
                nameEl.setAttribute('text-anchor', textAnchor);
                nameEl.setAttribute('font-size', '13');
                nameEl.textContent = labelText;

                const valueEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                valueEl.setAttribute('class', 'sankey-label-value');
                valueEl.setAttribute('x', textX);
                valueEl.setAttribute('y', nodeCenterY + 13);
                valueEl.setAttribute('text-anchor', textAnchor);
                valueEl.setAttribute('font-size', '11');
                valueEl.textContent = valueText;

                g.appendChild(nameEl);
                g.appendChild(valueEl);
                labelLayer.appendChild(g);
            });

            resolveLabelCollisions(labelLayer, true);
            resolveLabelCollisions(labelLayer, false);
        }

        // Two labels can still land close enough vertically to overlap when nodes are
        // densely packed (e.g. many small flows into one column). This nudges colliding
        // label groups apart along Y after initial placement, per column.
        function resolveLabelCollisions(labelLayer, isLeftColumn) {
            const groups = Array.from(labelLayer.children).filter(g => {
                const nameEl = g.querySelector('.sankey-label-text');
                return nameEl && nameEl.getAttribute('text-anchor') === (isLeftColumn ? 'end' : 'start');
            });
            const withY = groups.map(g => {
                const nameEl = g.querySelector('.sankey-label-text');
                return { g, y: parseFloat(nameEl.getAttribute('y')) };
            }).sort((a, b) => a.y - b.y);

            const minGap = 30;
            for (let i = 1; i < withY.length; i++) {
                const prev = withY[i - 1];
                const cur = withY[i];
                if (cur.y - prev.y < minGap) {
                    const shift = minGap - (cur.y - prev.y);
                    cur.y += shift;
                    const nameEl = cur.g.querySelector('.sankey-label-text');
                    const valueEl = cur.g.querySelector('.sankey-label-value');
                    nameEl.setAttribute('y', cur.y);
                    valueEl.setAttribute('y', cur.y + 16);
                }
            }
        }

        function attachLinkHighlighting() {
            const chartContainer = document.getElementById('sankey-chart');
            const nodeEls = chartContainer.querySelectorAll('.sankey .node');
            const linkPaths = chartContainer.querySelectorAll('.sankey-link');

            nodeEls.forEach((nodeEl, i) => {
                nodeEl.addEventListener('mouseenter', () => {
                    const name = nodes[i] ? nodes[i].name : null;
                    if (!name) return;
                    linkPaths.forEach((path, idx) => {
                        const g = activeGradientsCache[idx];
                        if (!g) return;
                        const connected = g.sourceName === name || g.targetName === name;
                        path.classList.toggle('is-dimmed', !connected);
                    });
                });
                nodeEl.addEventListener('mouseleave', () => {
                    linkPaths.forEach(path => path.classList.remove('is-dimmed'));
                });
            });
        }

        function renderAccessibleSummary(validLinks) {
            const existing = document.getElementById('sankey-a11y-summary');
            if (existing) existing.remove();
            const summary = document.createElement('div');
            summary.id = 'sankey-a11y-summary';
            summary.className = 'sr-only';
            summary.setAttribute('role', 'note');
            summary.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;';
            const lines = validLinks.map(l => `${l.source} to ${l.target}: ${formatFlowValue(l.value)}`);
            summary.textContent = `Sankey diagram flows. ${lines.join('. ')}.`;
            document.getElementById('sankey-chart').appendChild(summary);
        }

        function setupDragObserver() {
            const chartContainer = document.getElementById('sankey-chart');
            if (!chartContainer) return;

            let debounceHandle = null;
            dragObserver = new MutationObserver((mutations) => {
                const onlyOwnLayers = mutations.every(m =>
                    (m.target.closest && (m.target.closest('.local-gradient-defs') || m.target.closest('.local-label-layer'))) ||
                    (m.target.classList && (m.target.classList.contains('local-gradient-defs') || m.target.classList.contains('local-label-layer')))
                );
                if (onlyOwnLayers) return;

                clearTimeout(debounceHandle);
                debounceHandle = setTimeout(() => {
                    dragObserver.disconnect();
                    stripNativeLabels();
                    applyLocalGradients();
                    drawValueLabels();
                    attachLinkHighlighting();
                    dragObserver.observe(chartContainer, { childList: true, subtree: true, attributes: true });
                }, 30);
            });

            dragObserver.observe(chartContainer, { childList: true, subtree: true, attributes: true });
        }

        function exportJSON() {
            const data = { version: 1, nodes, links };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importJSON() { document.getElementById('json-file-input').click(); }

        document.getElementById('json-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.nodes || !data.links) throw new Error("Missing structural arrays");
                    nodes = data.nodes; links = data.links;
                    renderNodes(); renderFlowsTable(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Parsing Exception: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        function exportBranding() {
            if (nodes.length === 0) return alert("Populate target system nodes to export profiles.");
            const brandingMap = nodes.map(n => ({ name: n.name, color: n.color }));
            const blob = new Blob([JSON.stringify({ brandingProfile: brandingMap }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_branding.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importBranding() { document.getElementById('branding-file-input').click(); }

        document.getElementById('branding-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.brandingProfile) throw new Error("Invalid signature layout array.");
                    
                    data.brandingProfile.forEach(profile => {
                        const targetNode = nodes.find(n => n.name.toLowerCase() === profile.name.toLowerCase());
                        if (targetNode) targetNode.color = profile.color;
                    });
                    
                    renderNodes(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Branding Load Exception: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        // Plotly's own toImage/downloadImage re-render from the bare figure spec, which would
        // export flat near-invisible link fills and skip our injected gradients and labels
        // entirely. Instead we serialize the live, fully-styled SVG that's actually on screen.
        function getStyledSvgString() {
            const chartContainer = document.getElementById('sankey-chart');
            const svgEl = chartContainer.querySelector('svg.main-svg');
            if (!svgEl) return null;

            const clone = svgEl.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Inline the stylesheet rules our classes depend on, since a standalone SVG
            // file has no access to this page's <style> block.
            const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleEl.textContent = `
                .sankey-link { fill-opacity: 0.82; stroke-opacity: 0; }
                .sankey-leader { stroke: #cbd5e1; stroke-width: 1px; }
                .sankey-label-text { font-family: Inter, system-ui, sans-serif; font-weight: 600; font-size: 13px; fill: #0f172a; }
                .sankey-label-value { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #94a3b8; }
            `;
            clone.insertBefore(styleEl, clone.firstChild);

            // Strip transient hover/interaction state and the offscreen a11y note.
            clone.querySelectorAll('.is-dimmed').forEach(el => el.classList.remove('is-dimmed'));
            const a11y = clone.querySelector('#sankey-a11y-summary');
            if (a11y) a11y.remove();

            const bbox = svgEl.getBBox ? null : null; // not needed; viewBox already set by Plotly
            return new XMLSerializer().serializeToString(clone);
        }

        function exportSVG() {
            if (!chartDiv) return alert("Render diagram first.");
            const svgString = getStyledSvgString();
            if (!svgString) return alert("Could not read chart SVG.");
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sankey_diagram.svg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportPNG() {
            if (!chartDiv) return alert("Render diagram first.");
            const svgString = getStyledSvgString();
            if (!svgString) return alert("Could not read chart SVG.");

            const svgEl = document.getElementById('sankey-chart').querySelector('svg.main-svg');
            const rect = svgEl.getBoundingClientRect();
            const scale = 3; // ~ultra-high-res export

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const svgUrl = URL.createObjectURL(svgBlob);

            img.onload = function () {
                const canvas = document.createElement('canvas');
                canvas.width = rect.width * scale;
                canvas.height = rect.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.scale(scale, scale);
                ctx.drawImage(img, 0, 0, rect.width, rect.height);
                URL.revokeObjectURL(svgUrl);

                canvas.toBlob(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'sankey_diagram_high_res.png';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                }, 'image/png');
            };
            img.onerror = function () {
                URL.revokeObjectURL(svgUrl);
                alert("PNG export failed to rasterize. Try Export Vector SVG instead.");
            };
            img.src = svgUrl;
        }

        function resetAll() {
            if (!confirm("Reset chart workspace entirely?")) return;
            if (dragObserver) dragObserver.disconnect();
            nodes = []; links = []; 
            localStorage.removeItem('sankeyWorkspaceData_v13');
            renderNodes(); renderFlowsTable();
            document.getElementById('sankey-chart').innerHTML = '';
        }

        function loadDefaultExample() {
            nodes = [
                { name: "iPhone", color: "#1c1c1e" },
                { name: "Mac", color: "#94a3b8" },
                { name: "iPad", color: "#0ea5e9" },
                { name: "Wearables & Home", color: "#f59e0b" },
                { name: "Services", color: "#8b5cf6" },
                { name: "Direct Channel (Retail/Web)", color: "#3b82f6" },
                { name: "Indirect Channel (Carriers)", color: "#64748b" },
                { name: "Gross Margin (Profit)", color: "#10b981" },
                { name: "Cost of Sales", color: "#ef4444" }
            ];

            links = [
                { source: "iPhone", target: "Direct Channel (Retail/Web)", value: 35.45 },
                { source: "iPhone", target: "Indirect Channel (Carriers)", value: 165.13 },
                { source: "Mac", target: "Direct Channel (Retail/Web)", value: 10.00 },
                { source: "Mac", target: "Indirect Channel (Carriers)", value: 19.36 },
                { source: "iPad", target: "Direct Channel (Retail/Web)", value: 7.00 },
                { source: "iPad", target: "Indirect Channel (Carriers)", value: 21.30 },
                { source: "Wearables & Home", target: "Direct Channel (Retail/Web)", value: 8.00 },
                { source: "Wearables & Home", target: "Indirect Channel (Carriers)", value: 31.85 },
                { source: "Services", target: "Direct Channel (Retail/Web)", value: 85.20 },
                { source: "Direct Channel (Retail/Web)", target: "Gross Margin (Profit)", value: 80.00 },
                { source: "Direct Channel (Retail/Web)", target: "Cost of Sales", value: 65.65 },
                { source: "Indirect Channel (Carriers)", target: "Gross Margin (Profit)", value: 89.15 },
                { source: "Indirect Channel (Carriers)", target: "Cost of Sales", value: 148.49 }
            ];

            renderNodes();
            renderFlowsTable();
            generateDiagram();
        }

        window.onload = function() {
            loadFromLocalStorage();
            
            const slider = document.getElementById('global-opacity-slider');
            slider.value = Math.round(globalOpacityValue * 100);
            document.getElementById('opacity-slider-readout').innerText = slider.value + '%';
            
            if (nodes.length === 0) {
                loadDefaultExample();
            } else {
                renderNodes();
                renderFlowsTable();
                generateDiagram();
            }
        };
    </script>
