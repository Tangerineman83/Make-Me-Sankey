<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Me Sankey!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .mono-num { font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }
        
        .interactive-row { transition: all 0.15s ease; }
        .interactive-row:hover { background-color: #f8fafc; }

        /* ---- Hand-authored Sankey SVG: presentation layer ---- */
        #sankey-svg { width: 100%; height: 100%; display: block; }

        .sk-ribbon {
            transition: opacity 0.16s ease, filter 0.16s ease;
            cursor: pointer;
        }
        .sk-ribbon:hover {
            filter: brightness(1.08);
        }
        .sk-ribbon.is-dimmed {
            opacity: 0.07 !important;
        }

        .sk-node {
            cursor: pointer;
            transition: filter 0.16s ease, opacity 0.16s ease;
        }
        .sk-node:hover {
            filter: brightness(1.1);
        }
        .sk-node.is-dimmed {
            opacity: 0.3;
        }
        .sk-node.is-selected {
            stroke: #0f172a;
            stroke-width: 1.5px;
        }

        .sk-leader {
            stroke: #cbd5e1;
            stroke-width: 1px;
        }

        .sk-label-name {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 600;
            font-size: 12.5px;
            fill: #1e293b;
            letter-spacing: -0.006em;
            cursor: pointer;
            transition: opacity 0.16s ease;
        }
        .sk-label-value {
            font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
            font-weight: 600;
            font-size: 11.5px;
            fill: #0f172a;
        }
        .sk-label.is-dimmed .sk-label-name { opacity: 0.32; }
        .sk-label.is-dimmed .sk-label-value { opacity: 0.32; }

        .sk-col-header {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            fill: #94a3b8;
        }

        @media (prefers-reduced-motion: reduce) {
            .sk-ribbon, .sk-node, .sk-label-name { transition: none !important; }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen">

    <div class="max-w-[1600px] mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 pb-6 border-b border-slate-200">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-sm">
                        <i class="fa-solid fa-diagram-project text-base"></i>
                    </div>
                    <h1 class="text-3xl font-bold title-font text-slate-900 tracking-tight">Make Me Sankey!</h1>
                </div>
                <p class="text-slate-500 mt-1.5 text-sm">Design crisp, high-resolution flow models instantly onto clean transparent layers.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importJSON()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all" title="Import Model Structure Data File">
                        <i class="fa-solid fa-file-import text-slate-400"></i>
                        <span>Import Model</span>
                    </button>
                    <button onclick="exportJSON()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all" title="Export Model Structure Data File">
                        <i class="fa-solid fa-file-code text-slate-400"></i>
                        <span>Export Model</span>
                    </button>
                </div>

                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="importBranding()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="Load Custom Corporate Color Profiles">
                        <i class="fa-solid fa-palette"></i>
                        <span>Load Branding</span>
                    </button>
                    <button onclick="exportBranding()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="Save Current Color Space Schemes">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span>Save Branding</span>
                    </button>
                </div>

                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="generateDiagram()" class="flex items-center gap-1.5 px-3.5 py-2 bg-slate-900 hover:bg-black text-white text-xs font-semibold rounded-lg transition-all shadow-sm">
                        <i class="fa-solid fa-rotate"></i>
                        <span>Render Layout</span>
                    </button>
                    <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                    <button onclick="exportSVG()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition-all" title="Export Vector SVG, transparent background">
                        <i class="fa-solid fa-vector-square text-slate-400"></i>
                        <span>Export SVG</span>
                    </button>
                </div>

                <button onclick="resetAll()" class="px-3.5 py-2 text-xs font-medium text-rose-600 hover:bg-rose-50 rounded-xl border border-rose-200 transition-all flex items-center gap-1.5">
                    <i class="fa-solid fa-trash-can text-xs"></i>
                    <span>Clear</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-3 glass-card p-5 shadow-sm bg-white">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight flex items-center gap-2">
                            <span>Nodes</span>
                            <span id="node-count-badge" class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-mono font-medium">0</span>
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Label structural targets</p>
                    </div>
                    <button onclick="addNode()" class="w-8 h-8 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-lg transition-all flex items-center justify-center border border-slate-200">
                        <i class="fa-solid fa-plus text-sm"></i>
                    </button>
                </div>
                <div id="nodes-list" class="space-y-2.5 max-h-[580px] overflow-y-auto pr-1"></div>
            </div>

            <div class="lg:col-span-4 glass-card p-5 shadow-sm bg-white flex flex-col">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Flow Mapping</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Link mapping intersections</p>
                    </div>
                    <button onclick="addFlowRow()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-xs font-medium rounded-lg transition-all">
                        <i class="fa-solid fa-circle-plus text-xs"></i>
                        <span>Add Flow</span>
                    </button>
                </div>
                
                <div class="flex-1 overflow-x-auto border border-slate-200 rounded-xl bg-white">
                    <table class="w-full text-xs min-w-[360px]">
                        <thead class="bg-slate-50 text-slate-500 font-semibold uppercase tracking-wider border-b border-slate-200 sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-2.5 text-left font-medium">Source</th>
                                <th class="px-3 py-2.5 text-left font-medium">Target</th>
                                <th class="px-3 py-2.5 text-left font-medium w-24">Value</th>
                                <th class="w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="flows-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-5 glass-card p-5 shadow-sm flex flex-col min-h-[540px]">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="font-bold text-base text-slate-800 tracking-tight">Sankey Output Canvas</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Crisp gradient flows, ready to present</p>
                    </div>
                    
                    <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 shadow-inner">
                        <span class="text-xs font-semibold text-slate-500">Flow Fade:</span>
                        <input type="range" id="global-opacity-slider" min="0" max="100" value="40" 
                               class="w-24 accent-slate-900 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                               oninput="updateCanvasOpacity(this.value)">
                        <span id="opacity-slider-readout" class="text-xs font-mono font-bold text-slate-700 min-w-[34px] text-right">40%</span>
                    </div>
                </div>
                
                <div class="flex-1 bg-transparent p-2 rounded-xl border border-dashed border-slate-200 flex items-center justify-center min-h-[460px] relative">
                    <div id="sankey-chart" class="w-full h-full"></div>
                </div>
            </div>
            
        </div>
    </div>

    <input type="file" id="json-file-input" accept=".json" class="hidden">
    <input type="file" id="branding-file-input" accept=".json" class="hidden">

    <script>
        let nodes = [];
        let links = [];
        let chartDiv = null;
        let globalOpacityValue = 0.40; 
        let activeGradientsCache = [];

        function saveToLocalStorage() {
            try { localStorage.setItem('sankeyWorkspaceData_v13', JSON.stringify({ nodes, links, globalOpacityValue })); } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('sankeyWorkspaceData_v13');
                if (saved) {
                    const data = JSON.parse(saved);
                    nodes = data.nodes || [];
                    links = data.links || [];
                    globalOpacityValue = data.globalOpacityValue !== undefined ? data.globalOpacityValue : 0.40;
                }
            } catch (e) {}
        }

        function updateCanvasOpacity(value) {
            globalOpacityValue = parseFloat(value) / 100;
            document.getElementById('opacity-slider-readout').innerText = value + '%';
            generateDiagram();
            saveToLocalStorage();
        }

        function renderNodes() {
            const container = document.getElementById('nodes-list');
            const badge = document.getElementById('node-count-badge');
            container.innerHTML = '';
            badge.innerText = nodes.length;

            if (nodes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50 text-slate-400">
                        <i class="fa-solid fa-bezier-curve text-xl mb-2 text-slate-300"></i>
                        <p class="text-xs">No elements configured</p>
                    </div>`;
                return;
            }

            nodes.forEach((node, index) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-2.5 p-2 bg-white border border-slate-200 rounded-xl shadow-sm transition-all hover:border-slate-300`;
                div.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <input type="text" value="${node.name}" class="w-full bg-transparent border-0 focus:ring-1 focus:ring-slate-400 rounded-md font-medium text-slate-800 text-xs px-2 py-1"
                               onchange="updateNodeName(${index}, this.value)">
                    </div>
                    <div class="relative w-7 h-7 rounded-md border border-slate-200 overflow-hidden flex-shrink-0 shadow-inner">
                        <input type="color" value="${node.color || '#94a3b8'}" class="absolute scale-[2] top-[-50%] left-[-50%] w-[200%] h-[200%] cursor-pointer border-0"
                               onchange="updateNodeColor(${index}, this.value)">
                    </div>
                    <button onclick="deleteNode(${index})" class="text-slate-400 hover:text-rose-600 p-1.5 transition-colors flex-shrink-0">
                        <i class="fa-solid fa-circle-xmark text-sm"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            updateFlowSelects();
        }

        function addNode() {
            const name = prompt("Enter Node Name:", `Node ${nodes.length + 1}`);
            if (!name || !name.trim()) return;
            const premiumPalette = ['#1e293b', '#2563eb', '#10b981', '#7c3aed', '#f43f5e', '#d97706', '#0891b2', '#475569'];
            const chosenColor = premiumPalette[nodes.length % premiumPalette.length] || '#475569';
            nodes.push({ name: name.trim(), color: chosenColor });
            renderNodes();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateNodeName(index, newName) {
            if (!newName.trim()) return;
            const oldName = nodes[index].name;
            nodes[index].name = newName.trim();
            links.forEach(l => {
                if (l.source === oldName) l.source = nodes[index].name;
                if (l.target === oldName) l.target = nodes[index].name;
            });
            saveToLocalStorage();
            updateFlowSelects();
            generateDiagram();
        }

        function updateNodeColor(index, newColor) {
            nodes[index].color = newColor;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteNode(index) {
            const name = nodes[index].name;
            nodes.splice(index, 1);
            links = links.filter(l => l.source !== name && l.target !== name);
            renderNodes();
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function renderFlowsTable() {
            const tbody = document.getElementById('flows-table-body');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-2 py-8 text-center text-slate-400 bg-slate-50/30">No connections mapped</td></tr>`;
                return;
            }

            links.forEach((link, index) => {
                const row = document.createElement('tr');
                row.className = 'interactive-row';
                row.innerHTML = `
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'source', this.value)">
                            ${createNodeOptions(link.source)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <select class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs bg-white text-slate-700 font-medium" onchange="updateLink(${index}, 'target', this.value)">
                            ${createNodeOptions(link.target)}
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <input type="number" value="${link.value}" step="any" min="0" class="w-full border border-slate-200 focus:ring-1 focus:ring-slate-400 rounded-lg px-1.5 py-1 text-xs font-mono font-semibold bg-white text-slate-800"
                               onchange="updateLink(${index}, 'value', parseFloat(this.value) || 0)">
                    </td>
                    <td class="px-1 py-1.5 text-center">
                        <button onclick="deleteLink(${index})" class="text-slate-300 hover:text-rose-500 p-1 transition-colors">
                            <i class="fa-solid fa-circle-minus text-sm"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function createNodeOptions(selected) {
            let html = `<option value="">— Select —</option>`;
            nodes.forEach(n => {
                html += `<option value="${n.name}" ${n.name === selected ? 'selected' : ''}>${n.name}</option>`;
            });
            return html;
        }

        function updateFlowSelects() { renderFlowsTable(); }

        function addFlowRow() {
            if (nodes.length < 2) { alert("Configure a minimum of two nodes first."); return; }
            links.push({ source: nodes[0].name, target: nodes[1].name, value: 100 });
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        function updateLink(index, field, value) {
            links[index][field] = value;
            saveToLocalStorage();
            generateDiagram();
        }

        function deleteLink(index) {
            links.splice(index, 1);
            renderFlowsTable();
            saveToLocalStorage();
            generateDiagram();
        }

        // Measures text width using an offscreen canvas so we can size layout margins
        // BEFORE layout runs, instead of discovering labels don't fit after the fact.
        // ============================================================
        // Hand-authored Sankey rendering engine.
        // No charting library: every node, ribbon, and label is computed
        // and drawn directly as SVG, following the same approach as a
        // hand-built editorial chart — manual bezier ribbons, two-pass
        // proportional node sizing, and labels placed in dedicated
        // margin space rather than fighting the flow paths for room.
        // ============================================================

        let measureCtx = null;
        function measureTextWidth(text, font) {
            if (!measureCtx) measureCtx = document.createElement('canvas').getContext('2d');
            measureCtx.font = font;
            return measureCtx.measureText(text).width;
        }

        function formatFlowValue(v) {
            if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
            return v.toLocaleString(undefined, { maximumFractionDigits: 1 });
        }

        // Assigns each node to a column (rank) by longest-path-from-source, so the
        // diagram reads left-to-right in true topological order regardless of the
        // order nodes/links were entered in. A node with no inflow is rank 0; every
        // other node's rank is one more than the maximum rank of its predecessors.
        // Falls back gracefully (rank 0) on cyclic input rather than infinite-looping.
        function assignColumns(nodeNames, validLinks) {
            const rank = {};
            nodeNames.forEach(n => rank[n] = 0);
            const incoming = {};
            nodeNames.forEach(n => incoming[n] = []);
            validLinks.forEach(l => incoming[l.target] && incoming[l.target].push(l.source));

            let changed = true;
            let iterations = 0;
            const maxIterations = nodeNames.length + 2;
            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;
                for (const n of nodeNames) {
                    const preds = incoming[n];
                    if (!preds.length) continue;
                    const maxPredRank = Math.max(...preds.map(p => rank[p] !== undefined ? rank[p] : 0));
                    if (maxPredRank + 1 > rank[n]) {
                        rank[n] = maxPredRank + 1;
                        changed = true;
                    }
                }
            }
            return rank;
        }

        // Two-pass proportional height sizing (technique: give every node its
        // proportional share of the column's available height, floored at a
        // minimum so thin flows stay visible/legible; if that floor pushes the
        // total past what's available, scale every node down by the same factor
        // so the column never overflows its own track).
        function layoutColumn(colNodes, usableH, topPad, gap) {
            const total = colNodes.reduce((sum, n) => sum + n.value, 0) || 1;
            const totalGap = gap * Math.max(colNodes.length - 1, 0);
            const available = Math.max(usableH - totalGap, 0);

            const MIN_NODE_H = 6;
            const rawHeights = colNodes.map(n => n.value > 0 ? Math.max((n.value / total) * available, MIN_NODE_H) : 0);
            const rawTotal = rawHeights.reduce((sum, h) => sum + h, 0) || 1;
            const scale = rawTotal > available ? available / rawTotal : 1;

            const totalUsed = rawHeights.reduce((s, h) => s + h * scale, 0) + totalGap;
            let y = topPad + (usableH - totalUsed) / 2; // vertically center the column as a whole

            return colNodes.map((n, i) => {
                const h = rawHeights[i] * scale;
                const seg = { ...n, y0: y, y1: y + h };
                y += h + gap;
                return seg;
            });
        }

        function generateDiagram() {
            const container = document.getElementById('sankey-chart');

            if (!nodes.length || !links.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-16 px-4 text-center">
                        <i class="fa-solid fa-cubes-stacked text-3xl mb-2 text-slate-200"></i>
                        <p class="text-xs font-medium">Awaiting Data Mappings</p>
                    </div>`;
                return;
            }

            const nodeIndex = {};
            nodes.forEach((n, i) => nodeIndex[n.name] = i);
            const validLinks = links.filter(l => nodeIndex[l.source] !== undefined && nodeIndex[l.target] !== undefined && l.value > 0);

            if (!validLinks.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-16 px-4 text-center">
                        <i class="fa-solid fa-cubes-stacked text-3xl mb-2 text-slate-200"></i>
                        <p class="text-xs font-medium">No valid flows to render</p>
                    </div>`;
                return;
            }

            // ---- Column assignment ----
            const nodeNames = nodes.map(n => n.name);
            const rank = assignColumns(nodeNames, validLinks);
            const maxRank = Math.max(...Object.values(rank));
            const numCols = maxRank + 1;

            const colNodeNames = Array.from({ length: numCols }, () => []);
            nodeNames.forEach(name => { colNodeNames[rank[name]].push(name); });

            // ---- Per-node total value (inflow if it has any, else outflow) ----
            function nodeValue(name) {
                const inflow = validLinks.filter(l => l.target === name).reduce((s, l) => s + l.value, 0);
                const outflow = validLinks.filter(l => l.source === name).reduce((s, l) => s + l.value, 0);
                return inflow > 0 ? inflow : outflow;
            }

            // ---- Sizing constants ----
            const labelFont = '600 12.5px Inter, system-ui, sans-serif';
            const valueFont = '600 11.5px "IBM Plex Mono", monospace';
            const colHeaderFont = '600 11px Space Grotesk, Inter, sans-serif';

            const leftNames = colNodeNames[0];
            const rightNames = colNodeNames[numCols - 1];
            const widestLeft = Math.max(0, ...leftNames.map(n => measureTextWidth(n, labelFont)));
            const widestRight = Math.max(0, ...rightNames.map(n => measureTextWidth(n, labelFont)));
            const leftMargin = Math.ceil(widestLeft + 38);
            const rightMargin = Math.ceil(widestRight + 38);

            const containerRect = container.getBoundingClientRect();
            const W = Math.max(containerRect.width || 900, 600);
            const colHeaderH = 26;
            const topPad = 24 + colHeaderH;
            const bottomPad = 20;
            const H = Math.max(440, Math.min(720, nodeNames.length * 30 + topPad + bottomPad));
            const usableH = H - topPad - bottomPad;

            const nodeThickness = 14;
            const plotLeft = leftMargin;
            const plotRight = W - rightMargin;
            const plotWidth = Math.max(plotRight - plotLeft, 100);
            const colX = Array.from({ length: numCols }, (_, i) =>
                numCols === 1 ? plotLeft + plotWidth / 2 : plotLeft + (plotWidth - nodeThickness) * (i / (numCols - 1)) + nodeThickness / 2
            );

            // ---- Build + lay out each column ----
            const gapFor = (count) => Math.max(4, Math.min(22, 320 / Math.max(count, 1)));
            const laidOut = colNodeNames.map(names => {
                const colNodes = names.map(name => ({
                    name,
                    color: (nodes[nodeIndex[name]] && nodes[nodeIndex[name]].color) || '#94a3b8',
                    value: nodeValue(name)
                })).sort((a, b) => b.value - a.value);
                return layoutColumn(colNodes, usableH, topPad, gapFor(colNodes.length));
            });
            const byKeyPerCol = laidOut.map(col => new Map(col.map(n => [n.name, n])));

            // ---- Ribbons: route every valid link through its (source col -> target col) pair ----
            // Stacked in display order per node so ribbons from/to the same node never cross
            // each other at that node's edge.
            const sourceCursors = new Map();
            const targetCursors = new Map();
            laidOut.forEach(col => col.forEach(n => {
                sourceCursors.set(n.name, n.y0);
                targetCursors.set(n.name, n.y0);
            }));

            // Process links grouped by source column, source nodes in display order, so the
            // stacking cursor logic is well-defined for arbitrary (non-adjacent) column jumps.
            const linksByRank = [...validLinks].sort((a, b) => {
                const ra = rank[a.source], rb = rank[b.source];
                if (ra !== rb) return ra - rb;
                return b.value - a.value;
            });

            const ribbons = linksByRank.map(l => {
                const sRank = rank[l.source], tRank = rank[l.target];
                const sNode = byKeyPerCol[sRank].get(l.source);
                const tNode = byKeyPerCol[tRank].get(l.target);
                if (!sNode || !tNode) return null;

                const sy0 = sourceCursors.get(l.source);
                const sy1 = sy0 + (sNode.y1 - sNode.y0) * (l.value / sNode.value);
                sourceCursors.set(l.source, sy1);

                const ty0 = targetCursors.get(l.target);
                const ty1 = ty0 + (tNode.y1 - tNode.y0) * (l.value / tNode.value);
                targetCursors.set(l.target, ty1);

                return {
                    source: l.source, target: l.target, value: l.value,
                    sRank, tRank, sy0, sy1, ty0, ty1,
                    sourceColor: sNode.color, targetColor: tNode.color
                };
            }).filter(Boolean);

            activeGradientsCache = ribbons;

            // ---- Build SVG ----
            let svg = '';
            const gradientDefs = ribbons.map((r, idx) =>
                `<linearGradient id="flow-grad-${idx}" gradientUnits="userSpaceOnUse" x1="${colX[r.sRank]}" y1="0" x2="${colX[r.tRank]}" y2="0">
                    <stop offset="0%" stop-color="${r.sourceColor}"/>
                    <stop offset="30%" stop-color="${r.sourceColor}" stop-opacity="${Math.max(globalOpacityValue, 0.6)}"/>
                    <stop offset="70%" stop-color="${r.targetColor}" stop-opacity="${Math.max(globalOpacityValue, 0.6)}"/>
                    <stop offset="100%" stop-color="${r.targetColor}"/>
                </linearGradient>`
            ).join('');
            svg += `<defs>${gradientDefs}</defs>`;

            function ribbonPath(x0, x1, r) {
                const midX = (x0 + x1) / 2;
                return `M ${x0} ${r.sy0}
                    C ${midX} ${r.sy0}, ${midX} ${r.ty0}, ${x1} ${r.ty0}
                    L ${x1} ${r.ty1}
                    C ${midX} ${r.ty1}, ${midX} ${r.sy1}, ${x0} ${r.sy1} Z`;
            }

            ribbons.forEach((r, idx) => {
                const x0 = colX[r.sRank], x1 = colX[r.tRank];
                svg += `<path d="${ribbonPath(x0, x1, r)}" fill="url(#flow-grad-${idx})" class="sk-ribbon" data-source="${escapeAttr(r.source)}" data-target="${escapeAttr(r.target)}"><title>${escapeAttr(r.source)} → ${escapeAttr(r.target)}: ${formatFlowValue(r.value)}</title></path>`;
            });

            // ---- Nodes ----
            laidOut.forEach((col, c) => {
                col.forEach(n => {
                    const x = colX[c] - nodeThickness / 2;
                    svg += `<rect x="${x}" y="${n.y0}" width="${nodeThickness}" height="${Math.max(n.y1 - n.y0, 1)}" rx="2.5" fill="${n.color}" stroke="rgba(15,23,42,0.08)" stroke-width="1" class="sk-node" data-name="${escapeAttr(n.name)}"><title>${escapeAttr(n.name)}: ${formatFlowValue(n.value)}</title></rect>`;
                });
            });

            // ---- Floating labels with leader lines (outside the flow, in margin space) ----
            const MIN_LABEL_GAP = 26;
            laidOut.forEach((col, c) => {
                const isLeftmost = c === 0;
                const isRightmost = c === numCols - 1;
                const isLeftSide = isLeftmost || (!isRightmost && c < (numCols - 1) / 2);
                let lastLabelMidY = -Infinity;

                col.forEach(n => {
                    const midY = (n.y0 + n.y1) / 2;
                    const nodeHeight = n.y1 - n.y0;
                    const tooThin = nodeHeight < 9;
                    const wouldCollide = midY - lastLabelMidY < MIN_LABEL_GAP;
                    const showLabel = !tooThin && !wouldCollide;

                    const x = colX[c];
                    const edgeX = isLeftSide ? x - nodeThickness / 2 : x + nodeThickness / 2;
                    const leaderLen = isLeftmost || isRightmost ? 10 : 7;
                    const leaderEndX = isLeftSide ? edgeX - leaderLen : edgeX + leaderLen;
                    const textX = isLeftSide ? leaderEndX - 6 : leaderEndX + 6;
                    const anchor = isLeftSide ? 'end' : 'start';

                    if (!showLabel) return;
                    lastLabelMidY = midY;

                    svg += `<g class="sk-label" data-name="${escapeAttr(n.name)}">`;
                    svg += `<line x1="${edgeX}" y1="${midY}" x2="${leaderEndX}" y2="${midY}" class="sk-leader"/>`;
                    svg += `<text x="${textX}" y="${midY - 3}" text-anchor="${anchor}" class="sk-label-name">${escapeHtml(n.name)}</text>`;
                    svg += `<text x="${textX}" y="${midY + 12}" text-anchor="${anchor}" class="sk-label-value">${formatFlowValue(n.value)}</text>`;
                    svg += `</g>`;
                });
            });

            container.innerHTML = `<svg id="sankey-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sankey-a11y-summary">${svg}</svg>`;
            chartDiv = container.querySelector('#sankey-svg');

            attachLinkHighlighting();
            renderAccessibleSummary(validLinks);
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function escapeAttr(s) {
            return escapeHtml(s).replace(/"/g, '&quot;');
        }

        // Hovering a node or ribbon highlights only what's connected to it; the rest dims.
        function attachLinkHighlighting() {
            const svgEl = chartDiv;
            if (!svgEl) return;
            const ribbonEls = svgEl.querySelectorAll('.sk-ribbon');
            const nodeEls = svgEl.querySelectorAll('.sk-node');
            const labelEls = svgEl.querySelectorAll('.sk-label');

            function setHighlight(name) {
                if (name === null) {
                    ribbonEls.forEach(r => r.classList.remove('is-dimmed'));
                    nodeEls.forEach(n => n.classList.remove('is-dimmed'));
                    labelEls.forEach(l => l.classList.remove('is-dimmed'));
                    return;
                }
                const connected = new Set([name]);
                activeGradientsCache.forEach(r => {
                    if (r.source === name) connected.add(r.target);
                    if (r.target === name) connected.add(r.source);
                });
                ribbonEls.forEach(r => {
                    const isConnected = r.dataset.source === name || r.dataset.target === name;
                    r.classList.toggle('is-dimmed', !isConnected);
                });
                nodeEls.forEach(n => n.classList.toggle('is-dimmed', !connected.has(n.dataset.name)));
                labelEls.forEach(l => l.classList.toggle('is-dimmed', !connected.has(l.dataset.name)));
            }

            nodeEls.forEach(n => {
                n.addEventListener('mouseenter', () => setHighlight(n.dataset.name));
                n.addEventListener('mouseleave', () => setHighlight(null));
            });
            labelEls.forEach(l => {
                l.addEventListener('mouseenter', () => setHighlight(l.dataset.name));
                l.addEventListener('mouseleave', () => setHighlight(null));
            });
            ribbonEls.forEach(r => {
                r.addEventListener('mouseenter', () => {
                    ribbonEls.forEach(other => other.classList.toggle('is-dimmed', other !== r));
                    nodeEls.forEach(n => n.classList.toggle('is-dimmed', n.dataset.name !== r.dataset.source && n.dataset.name !== r.dataset.target));
                    labelEls.forEach(l => l.classList.toggle('is-dimmed', l.dataset.name !== r.dataset.source && l.dataset.name !== r.dataset.target));
                });
                r.addEventListener('mouseleave', () => setHighlight(null));
            });
        }

        // Plain-text equivalent for screen readers, since the chart's meaning shouldn't
        // depend on color or spatial position alone.
        function renderAccessibleSummary(validLinks) {
            const svgEl = chartDiv;
            if (!svgEl) return;
            const existing = svgEl.querySelector('#sankey-a11y-summary');
            if (existing) existing.remove();
            const desc = document.createElementNS('http://www.w3.org/2000/svg', 'desc');
            desc.id = 'sankey-a11y-summary';
            const lines = validLinks.map(l => `${l.source} to ${l.target}: ${formatFlowValue(l.value)}`);
            desc.textContent = `Sankey diagram flows. ${lines.join('. ')}.`;
            svgEl.insertBefore(desc, svgEl.firstChild);
        }

        function exportJSON() {
            const data = { version: 1, nodes, links };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importJSON() { document.getElementById('json-file-input').click(); }

        document.getElementById('json-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.nodes || !data.links) throw new Error("Missing structural arrays");
                    nodes = data.nodes; links = data.links;
                    renderNodes(); renderFlowsTable(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Parsing Exception: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        function exportBranding() {
            if (nodes.length === 0) return alert("Populate target system nodes to export profiles.");
            const brandingMap = nodes.map(n => ({ name: n.name, color: n.color }));
            const blob = new Blob([JSON.stringify({ brandingProfile: brandingMap }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `sankey_branding.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function importBranding() { document.getElementById('branding-file-input').click(); }

        document.getElementById('branding-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.brandingProfile) throw new Error("Invalid signature layout array.");
                    
                    data.brandingProfile.forEach(profile => {
                        const targetNode = nodes.find(n => n.name.toLowerCase() === profile.name.toLowerCase());
                        if (targetNode) targetNode.color = profile.color;
                    });
                    
                    renderNodes(); saveToLocalStorage(); generateDiagram();
                } catch (err) { alert("Branding Load Exception: " + err.message); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        // Exports the live, fully-styled SVG exactly as rendered, with no background
        // fill — the diagram is transparent by default since we never paint one,
        // which keeps the file usable directly in decks, docs, or other designs.
        function getStyledSvgString() {
            const svgEl = chartDiv;
            if (!svgEl) return null;

            const clone = svgEl.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Inline the stylesheet rules our classes depend on, since a standalone SVG
            // file opened outside this page has no access to its <style> block.
            const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleEl.textContent = `
                .sk-ribbon { }
                .sk-node { }
                .sk-leader { stroke: #cbd5e1; stroke-width: 1px; }
                .sk-label-name { font-family: Inter, system-ui, sans-serif; font-weight: 600; font-size: 12.5px; fill: #1e293b; letter-spacing: -0.006em; }
                .sk-label-value { font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace; font-weight: 600; font-size: 11.5px; fill: #0f172a; }
                .sk-col-header { font-family: 'Space Grotesk', Inter, sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.04em; fill: #94a3b8; }
            `;
            clone.insertBefore(styleEl, clone.firstChild);

            // Strip transient hover/interaction state — exports should always reflect
            // the diagram's resting state, not whatever was hovered at export time.
            clone.querySelectorAll('.is-dimmed').forEach(el => el.classList.remove('is-dimmed'));

            return new XMLSerializer().serializeToString(clone);
        }

        function exportSVG() {
            if (!chartDiv) return alert("Render diagram first.");
            const svgString = getStyledSvgString();
            if (!svgString) return alert("Could not read chart SVG.");
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sankey_diagram.svg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetAll() {
            if (!confirm("Reset chart workspace entirely?")) return;
            nodes = []; links = []; 
            localStorage.removeItem('sankeyWorkspaceData_v13');
            renderNodes(); renderFlowsTable();
            document.getElementById('sankey-chart').innerHTML = '';
        }

        function loadDefaultExample() {
            nodes = [
                { name: "iPhone", color: "#1c1c1e" },
                { name: "Mac", color: "#94a3b8" },
                { name: "iPad", color: "#0ea5e9" },
                { name: "Wearables & Home", color: "#f59e0b" },
                { name: "Services", color: "#8b5cf6" },
                { name: "Direct Channel (Retail/Web)", color: "#3b82f6" },
                { name: "Indirect Channel (Carriers)", color: "#64748b" },
                { name: "Gross Margin (Profit)", color: "#10b981" },
                { name: "Cost of Sales", color: "#ef4444" }
            ];

            links = [
                { source: "iPhone", target: "Direct Channel (Retail/Web)", value: 35.45 },
                { source: "iPhone", target: "Indirect Channel (Carriers)", value: 165.13 },
                { source: "Mac", target: "Direct Channel (Retail/Web)", value: 10.00 },
                { source: "Mac", target: "Indirect Channel (Carriers)", value: 19.36 },
                { source: "iPad", target: "Direct Channel (Retail/Web)", value: 7.00 },
                { source: "iPad", target: "Indirect Channel (Carriers)", value: 21.30 },
                { source: "Wearables & Home", target: "Direct Channel (Retail/Web)", value: 8.00 },
                { source: "Wearables & Home", target: "Indirect Channel (Carriers)", value: 31.85 },
                { source: "Services", target: "Direct Channel (Retail/Web)", value: 85.20 },
                { source: "Direct Channel (Retail/Web)", target: "Gross Margin (Profit)", value: 80.00 },
                { source: "Direct Channel (Retail/Web)", target: "Cost of Sales", value: 65.65 },
                { source: "Indirect Channel (Carriers)", target: "Gross Margin (Profit)", value: 89.15 },
                { source: "Indirect Channel (Carriers)", target: "Cost of Sales", value: 148.49 }
            ];

            renderNodes();
            renderFlowsTable();
            generateDiagram();
        }

        window.onload = function() {
            loadFromLocalStorage();
            
            const slider = document.getElementById('global-opacity-slider');
            slider.value = Math.round(globalOpacityValue * 100);
            document.getElementById('opacity-slider-readout').innerText = slider.value + '%';
            
            if (nodes.length === 0) {
                loadDefaultExample();
            } else {
                renderNodes();
                renderFlowsTable();
                generateDiagram();
            }
        };
    </script>
</body>
